<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>이순신 — 결단의 사람</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<!-- theme: cold-iron -->
<style>
/* ═══════════════════════════════════════════════════════════════
   shared/themes/cold-iron.css
   톤: 차갑고 단단함 — 전쟁, 야망, 결단의 무게

   적합한 EP: 태조(이성계), 태종(이방원), 세조, 연산군 등
═══════════════════════════════════════════════════════════════ */

:root {
  --bg:  #0a0604;
  --bg2: #0f0906;
  --bg3: #140c08;

  --accent2: #8a5e1a;
  --accent3: #e0b060;

  --text:  #ece0d0;
  --text2: #c8b89a;
  --text3: #907860;

  --border:  #1e1408;
  --border2: #2e1e0c;
  --border3: #4e3418;

  --good2: #208848;
  --good3: #70f080;

  --bad2: #803020;
  --bad3: #f07060;

  --hist2: #3a2808;
  --hist3: #c09040;
}

</style>

<!-- shared/style.css -->
<style>
/* ═══════════════════════════════════════════════════════════════
   shared/style.css
   조선 27왕 시리즈 — 공통 스타일 (1층)

   원칙:
   - 구조, 레이아웃, 여백, 글꼴, 애니메이션은 여기서 정의
   - 색상은 변수(--var)로만 사용. 실제 색은 themes/*.css에서 정함
   - EP 고유 효과는 kings/ep??/style.css에서 추가
═══════════════════════════════════════════════════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 변수 기본값 (themes에서 덮어씀) ────────────────────────── */
:root {
  /* 배경 3단계 */
  --bg:  #0a0604;
  --bg2: #0f0906;
  --bg3: #140c08;

  /* 강조색 (시대/막 표시, 진행바, 인용) */
  --accent2: #8a5e1a;
  --accent3: #e0b060;

  /* 텍스트 3단계 */
  --text:  #ece0d0;
  --text2: #c8b89a;
  --text3: #907860;

  /* 테두리 3단계 */
  --border:  #1e1408;
  --border2: #2e1e0c;
  --border3: #4e3418;

  /* 정답 (성취 색) */
  --good2: #208848;
  --good3: #70f080;

  /* 오답 (경고 색) */
  --bad2: #803020;
  --bad3: #f07060;

  /* 사료/원문 박스 */
  --hist2: #3a2808;
  --hist3: #c09040;

  /* 글꼴 */
  --font-serif: 'Noto Serif KR', serif;
  --font-sans:  'Noto Sans KR', sans-serif;
}

html { background: var(--bg); }
html, body { min-height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  max-width: 640px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ═══ 씬 시스템 ═══════════════════════════════════════════════
   .sc 는 한 씬. display:none/flex로만 전환.
   position:fixed 안 씀 → 창 크기와 무관하게 동작.
   min-height:100vh + overflow:visible → 짧으면 채우고 길면 스크롤.
═══════════════════════════════════════════════════════════════ */
.sc {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg);
  opacity: 0;
  transition: opacity 0.35s ease;
}
.sc.on { display: flex; opacity: 1; }

@keyframes fi    { from { opacity: 0; } to { opacity: 1; } }
@keyframes fi-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ═══ 진행바 ═══════════════════════════════════════════════ */
.prog {
  flex-shrink: 0;
  background: var(--bg);
  padding: 8px 20px 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.prog-bar {
  flex: 1;
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}
.prog-back {
  background: transparent;
  border: 1px solid var(--border3);
  color: var(--text3);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  font-family: var(--font-serif);
  line-height: 1;
}
.prog-back:hover {
  border-color: var(--accent3);
  color: var(--accent3);
  transform: translateX(-2px);
}
.prog-back-spacer {
  width: 28px;
  height: 28px;
}
.prog-fill {
  height: 100%;
  background: var(--accent2);
  transition: width .6s ease;
}

/* ═══ 상단 네비 — 점3개 메뉴 (평상시 숨김, 호버 시 확장) ═══════
   .top-nav 는 높이 0짜리 sticky 앵커. 실제 버튼(.nav-kebab)은
   그 위에 떠서 우상단 구석에 머문다. 평상시엔 점3개 + 현재 위치
   라벨만 흐릿하게 보이고, 호버/포커스하면 메뉴가 왼쪽(가로)으로 펼쳐진다.
   우상단에 고정(right:12px)된 채 폭이 늘어 빈 가로 공간을 채우므로
   글자끼리 겹치지 않고, 펼쳐져도 아래 콘텐츠를 밀지 않는다. */
.top-nav {
  position: sticky;
  top: 0;
  height: 0;
  overflow: visible;
  z-index: 30;
}
.nav-kebab {
  position: absolute;
  top: 6px;
  right: 12px;
  display: inline-flex;
  flex-direction: row-reverse;    /* 점은 오른쪽 구석, 메뉴는 왼쪽으로 */
  align-items: center;
  gap: 6px;
  padding: 5px 9px;
  border-radius: 13px;
  background: var(--bg);          /* 뒤 진행바 선을 가리되 페이지색과 섞임 */
  border: 1px solid transparent;
  color: var(--text3);            /* 평상시 흐릿 */
  cursor: pointer;
  outline: none;
  font-family: var(--font-sans);
  -webkit-tap-highlight-color: transparent;
  transition: background .2s ease, border-color .2s ease, color .2s ease;
}
.nav-kebab:hover,
.nav-kebab:focus-within {
  background: var(--bg2);
  border-color: var(--border3);
  color: var(--text2);
}
.nav-kebab-head {
  display: flex;
  flex-direction: row-reverse;    /* 점은 구석에, 라벨은 그 왼쪽 */
  align-items: center;
  gap: 8px;
}
.kebab-dots {
  display: inline-flex;
  flex-direction: column;
  gap: 2.5px;
  flex-shrink: 0;
}
.kebab-dots i {
  display: block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: currentColor;
}
.nav-here {
  font-size: 11px;
  letter-spacing: 1px;
  white-space: nowrap;
  color: inherit;
}
/* 펼쳐지는 메뉴 — 평상시 접힘 */
.nav-menu {
  display: flex;
  flex-direction: row;            /* 가로 펼침 */
  align-items: center;
  gap: 4px;
  max-width: 0;
  opacity: 0;
  overflow: hidden;
  white-space: nowrap;
  transition: max-width .25s ease, opacity .2s ease;
}
.nav-kebab:hover .nav-menu,
.nav-kebab:focus-within .nav-menu {
  max-width: 340px;
  opacity: 1;
}
.nav-menu-ep {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text3);
  padding: 0 8px 0 2px;
  border-right: 1px solid var(--border2);
  margin-right: 2px;
  flex-shrink: 0;
}
.nav-menu a {
  display: block;
  padding: 6px 8px;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text2);
  text-decoration: none;
  white-space: nowrap;
  border-radius: 7px;
  flex-shrink: 0;
  transition: background .15s ease, color .15s ease;
}
.nav-menu a:hover {
  background: var(--bg3);
  color: var(--accent3);
}
/* 모바일 — 가로 공간이 좁으면 세로 펼침으로 자동 전환 */
@media (max-width: 600px) {
  .nav-kebab { flex-direction: column; align-items: flex-end; gap: 0; }
  .nav-menu {
    flex-direction: column;
    align-items: flex-end;
    max-width: none;
    max-height: 0;
    transition: max-height .22s ease, opacity .2s ease, margin-top .2s ease;
  }
  .nav-kebab:hover .nav-menu,
  .nav-kebab:focus-within .nav-menu {
    max-width: none;
    max-height: 220px;
    margin-top: 8px;
  }
  .nav-menu-ep {
    border-right: none;
    border-bottom: 1px solid var(--border2);
    padding: 2px 8px 6px;
    margin: 0 0 2px;
  }
  .nav-menu a { width: 100%; text-align: right; padding: 7px 8px; }
}

/* ═══ 나레이션 씬 ═══════════════════════════════════════════ */
/* narration.svg 필드용 아트워크 컨테이너 (EP1 5막 실루엣 등) */
.narr-art {
  flex-shrink: 0;
  background: #060402;
  border-bottom: 1px solid var(--border);
}
.narr-art svg {
  width: 100%;
  display: block;
  max-height: 180px;
}

.narr-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 80px 28px 32px;
}
.narr-era {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text3);
  margin-bottom: 18px;
}
.narr-text {
  font-family: var(--font-serif);
  font-size: 19px;
  line-height: 2.6;
  color: var(--text2);
  min-height: 200px;
}
.narr-text em {
  color: var(--text);
  font-style: normal;
  font-weight: 600;
}
.narr-text strong {
  color: var(--accent3);
  font-weight: 600;
}
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent3);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .7s step-end infinite;
}
.nav-area {
  flex-shrink: 0;
  padding: 16px 24px 32px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ═══ 시대상황 씬 ═══════════════════════════════════════════ */
.context-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 50px 28px 32px;
}
.ctx-year {
  font-family: var(--font-serif);
  font-size: 52px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 20px;
}
.ctx-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: .5px;
}
.ctx-body {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text2);
  line-height: 2.3;
}
.ctx-body strong {
  color: var(--text);
  font-weight: 400;
}

/* ═══ 게임 씬 (대사 + 선택지) ═══════════════════════════════ */
.game-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 24px 0;
}
.dial-wrap {
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-bottom: 16px;
}
.dial {
  border-radius: 6px;
  padding: 13px 16px;
  animation: fi-up .3s ease;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-left: 2px solid var(--text3);
}
/* 화자 종류별 좌측 막대 색 (themes에서 다르게 줄 수 있음) */
.dial.npc-a  { border-left-color: var(--accent3); }
.dial.npc-b  { border-left-color: var(--good3); }
.dial.npc-c  { border-left-color: #8870b0; }
.dial.king   { border-left-color: var(--accent2); background: var(--bg3); }
.dial.father { border-left-color: var(--hist3); }

.dial-who {
  font-size: 10px;
  letter-spacing: 2px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text3);
}
.dial.npc-a  .dial-who { color: var(--accent3); }
.dial.npc-b  .dial-who { color: var(--good3); }
.dial.npc-c  .dial-who { color: #9878b8; }
.dial.king   .dial-who { color: var(--accent3); }
.dial.father .dial-who { color: var(--hist3); }

.dial-text {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text);
  line-height: 2;
}

/* 내면 독백 (방과의 시선) */
.inner-voice {
  margin: 0 0 14px;
  padding: 11px 15px;
  border-left: 2px solid var(--hist2);
  background: var(--bg2);
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text3);
  line-height: 2.1;
  font-style: italic;
  animation: fi .4s ease;
}

/* ═══ 선택지 ═══════════════════════════════════════════════ */
.ch-area { padding: 16px 0 32px; }
.ch-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  font-family: var(--font-serif);
  letter-spacing: .3px;
  line-height: 1.6;
}
.ch-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.ch {
  width: 100%;
  text-align: left;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 13px 15px;
  color: var(--text2);
  font-family: var(--font-serif);
  font-size: 14px;
  line-height: 1.7;
  cursor: pointer;
  transition: all .15s;
}
.ch:hover:not(.locked):not(.blocked) {
  background: var(--bg3);
  border-color: var(--border3);
  color: var(--text);
}
.ch.locked {
  background: var(--hist2);
  border-color: var(--hist2);
  color: var(--hist3);
  cursor: default;
}
.ch.previously-chosen {
  border-left: 2px solid var(--accent3);
  background: var(--bg3);
  color: var(--text);
  position: relative;
}
.ch.previously-chosen::before {
  content: '✓';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent3);
  font-size: 13px;
  opacity: 0.6;
}
.ch.blocked { opacity: .25; cursor: default; pointer-events: none; }
.ch.wrong-shake { animation: shake .35s ease; }

.block-msg {
  display: none;
  margin-top: 10px;
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border3);
  border-radius: 5px;
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  animation: fi .3s ease;
}
.block-msg.on { display: block; }

/* "정답 없음" 막의 코멘트 */
.no-answer-msg {
  display: none;
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--bg2);
  border: 1px solid var(--border3);
  border-radius: 5px;
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text2);
  line-height: 2;
  animation: fi .3s ease;
}
.no-answer-msg.on { display: block; }
.no-answer-nav { display: none; margin-top: 12px; }
.no-answer-nav.on { display: flex; gap: 8px; }

/* ═══ 깊게 살펴보기 (게임 씬 안에서 펼쳐짐) ═══════════════════ */
.deep-reveal {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 1.2s ease, opacity 1.2s ease;
  margin-top: 0;
}
.deep-reveal.on {
  max-height: 5000px;
  opacity: 1;
  margin-top: 24px;
}
.deep-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border3), transparent);
  margin: 8px 0 24px;
}
.deep-reveal .nav-area {
  padding: 24px 0 0;
  margin-top: 8px;
}

/* ═══ 깊게 살펴보기 (별도 씬 - 호환용) ═══════════════════════ */
.deep-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 28px 24px;
}
.deep-tag {
  font-size: 11px;
  letter-spacing: 2px;
  font-weight: 500;
  margin-bottom: 10px;
  color: var(--accent3);
}
.deep-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 14px;
}
.deep-text {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text2);
  line-height: 2.3;
}
.deep-text em { color: var(--text3); font-style: italic; }
.deep-quote {
  margin-top: 16px;
  padding: 12px 16px;
  border-left: 2px solid var(--accent2);
  background: var(--bg2);
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--accent3);
  line-height: 2;
  font-style: italic;
}

/* ═══ 오프닝 씬 ═══════════════════════════════════════════════ */
.opening {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
}

/* 순차 등장 베이스 */
.fade-target {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 1s ease, transform 1s ease;
}
.fade-target.on {
  opacity: 1;
  transform: translateY(0);
}

.op-question {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 24px;
  letter-spacing: .5px;
  line-height: 1.8;
}
.op-glyph {
  font-family: var(--font-serif);
  font-size: 64px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 20px;
}
.op-series {
  font-size: 11px;
  color: var(--accent3);
  letter-spacing: 3px;
  margin-bottom: 36px;
}

/* 흐름형 lines — 한 줄씩 세로로 자연스럽게 등장 */
.op-lines {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 36px;
  max-width: 480px;
}
.op-line-stacked {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--text2);
  line-height: 2.0;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 1s ease, transform 1s ease;
  text-align: center;
}
.op-line-stacked.on {
  opacity: 1;
  transform: translateY(0);
}
.op-line-stacked em {
  color: var(--accent3);
  font-style: normal;
}
.op-line-stacked strong {
  color: var(--text);
  font-weight: 600;
}

.op-start {
  margin-top: 8px;
}

/* opening portal — s.portal:true 일 때 glyph 자리에 들어가는 회전 포탈 */
.op-portal-wrap {
  width: 100px;
  height: 100px;
  margin: 0 auto 24px;
  position: relative;
}
.op-portal {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.op-portal-ring-out {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-top-color: var(--accent2);
  border-right-color: var(--accent2);
  animation: spin 2s linear infinite;
}
.op-portal-ring-mid {
  position: absolute;

  to   { transform: rotate(360deg); }
}

  font-size: 12px;

}

/* ═══ 에필로그 씬 ═══════════════════════════════════════════ */
.epi-body { flex: 1; padding: 28px; }

  background: var(--bg2);

</style>

</head>
<body>

<div id="game-root"></div>

<!-- shared/engine.js -->
<script>
/* ═══════════════════════════════════════════════════════════════
   shared/engine.js
   조선 27왕 시리즈 — 게임 엔진

   역할:
   - scenes.json 데이터를 받아 게임을 화면에 그림
   - 씬 간 전환, 선택지 처리, 진행률 계산
   - 게임 종료 시 부모(episode.html)에게 신호 전송

   사용법:
   1. HTML에 빈 div 하나만 두면 됨: <div id="game-root"></div>
   2. window.GameEngine.start(scenesData) 호출
   3. 끝나면 자동으로 부모 프레임에 'game-complete' 메시지 발송
═══════════════════════════════════════════════════════════════ */

(function() {
  'use strict';

  // ─── 상태 ────────────────────────────────────────────────
  const state = {
    data: null,           // scenes.json 전체
    currentSceneIdx: 0,   // 현재 씬 인덱스
    flags: {},            // 학생의 선택 기록
    actsCompleted: [],    // 완료한 막 ID 목록
    lockedScenes: new Set(),  // 선택을 이미 한 씬 (뒤로가기 제한용)
    visitedScenes: new Set()  // 이미 본 씬 (타이핑 스킵용)
  };

  // ─── 엔진 시작 ───────────────────────────────────────────
  function start(scenesData) {
    state.data = scenesData;
    state.currentSceneIdx = 0;
    state.flags = {};
    state.actsCompleted = [];
    state.lockedScenes = new Set();
    state.visitedScenes = new Set();
    renderScene();
  }

  // ─── 현재 씬 렌더링 ─────────────────────────────────────
  function renderScene() {
    const scene = state.data.scenes[state.currentSceneIdx];
    if (!scene) {
      finish();
      return;
    }

    const root = document.getElementById('game-root');
    if (!root) {
      console.error('GameEngine: #game-root not found');
      return;
    }

    // 모든 씬은 .sc 클래스로
    root.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'sc';

    // 씬 타입별 처리
    switch (scene.type) {
      case 'opening':    renderOpening(el, scene);    break;
      case 'narration':  renderNarration(el, scene);  break;
      case 'context':    renderContext(el, scene);    break;
      case 'game':       renderGame(el, scene);       break;
      case 'deep':       renderDeep(el, scene);       break;
      case 'epilogue':   renderEpilogue(el, scene);   break;
      default:
        el.innerHTML = `<div style="padding:20px;color:#f80;">알 수 없는 씬 타입: ${scene.type}</div>`;
    }

    root.appendChild(el);
    requestAnimationFrame(() => el.classList.add('on'));

    // 진행바 업데이트
    updateProgress();

    // 뒤로가기 버튼 이벤트
    const backBtn = el.querySelector('#prog-back');
    if (backBtn) backBtn.onclick = goBack;

    // 이 씬을 방문 목록에 추가
    state.visitedScenes.add(state.currentSceneIdx);

    // 스크롤 맨 위로
    window.scrollTo(0, 0);
  }

  // ─── 씬 타입별 렌더 ────────────────────────────────────────

  function renderOpening(el, s) {
    const linesHTML = (s.lines || []).map((l, i) =>
      `<div class="op-line-stacked" data-i="${i}">${parseInline(l)}</div>`
    ).join('');

    // s.portal: true 면 glyph 자리에 회전 포탈 (EP1 환생씬 흡수용)
    const glyphOrPortalHTML = s.portal
      ? `<div class="op-portal-wrap fade-target" data-step="1">
           <div class="op-portal">
             <div class="op-portal-ring-out"></div>
             <div class="op-portal-ring-mid"></div>
             ${s.glyph ? `<div class="op-glyph-in-portal">${escapeHTML(s.glyph)}</div>` : ''}
           </div>
         </div>`
      : (s.glyph ? `<div class="op-glyph fade-target" data-step="1">${escapeHTML(s.glyph)}</div>` : '');

    el.innerHTML = `
      <div class="opening">
        ${s.question ? `<div class="op-question fade-target" data-step="0">${escapeHTML(s.question)}</div>` : ''}
        ${glyphOrPortalHTML}
        ${s.series ? `<div class="op-series fade-target" data-step="2">${escapeHTML(s.series)}</div>` : ''}
        ${linesHTML ? `<div class="op-lines">${linesHTML}</div>` : ''}
        <button class="btn-p solid op-start fade-target" data-step="9" id="op-next">시작 →</button>
      </div>
    `;

    // 순차 등장
    const targets = el.querySelectorAll('.fade-target');
    targets.forEach(t => {
      const step = parseInt(t.dataset.step);
      setTimeout(() => t.classList.add('on'), 200 + step * 600);
    });
    const linesEls = el.querySelectorAll('.op-line-stacked');
    linesEls.forEach((line, i) => {
      // glyph/question/series 다음에 lines가 한 줄씩
      setTimeout(() => line.classList.add('on'), 200 + (3 + i) * 600);
    });
    // 시작 버튼은 lines 다 끝난 다음
    const startBtn = el.querySelector('.op-start');
    if (startBtn) {
      const totalLines = linesEls.length;
      setTimeout(() => startBtn.classList.add('on'), 200 + (3 + totalLines + 1) * 600);
    }

    if (startBtn) startBtn.onclick = nextScene;
  }

  function renderNarration(el, s) {
    // s.svg: raw SVG 문자열을 본문 위 아트워크로 삽입 (EP1 5막 실루엣용)
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      ${s.svg ? `<div class="narr-art">${s.svg}</div>` : ''}
      <div class="narr-body">
        ${s.era ? `<div class="narr-era">${escapeHTML(s.era)}</div>` : ''}
        <div class="narr-text" id="narr-target"></div>
      </div>
      <div class="nav-area" id="narr-nav" style="display:none;">
        <button class="btn-p solid" id="narr-next">${getNextLabel()}</button>
      </div>
    `;
    el.querySelector('#narr-next').onclick = nextScene;

    const target = el.querySelector('#narr-target');
    const navEl = el.querySelector('#narr-nav');

    // 이미 본 씬이면 타이핑 스킵 — 즉시 전체 표시
    if (state.visitedScenes.has(state.currentSceneIdx)) {
      target.innerHTML = parseInline(s.text || '');
      navEl.style.display = '';
      navEl.classList.add('fade-target', 'on');
      return;
    }

    // 처음 보는 씬 — 타이핑 효과
    typeText(target, s.text || '', () => {
      navEl.style.display = '';
      navEl.classList.add('fade-target', 'on');
    });
  }

  // 타이핑 효과 (이성계편 방식)
  let typingTimers = [];
  let typingToken = 0;
  const TYPE_SPEED = 44;

  function typeText(el, rawText, onDone) {
    typingTimers.forEach(clearTimeout);
    typingTimers = [];
    typingToken++;
    const myToken = typingToken;

    // 인라인 마크업 미리 파싱 (그대로 두고 글자만 진행)
    // 단순화: 한 글자씩 보여주되, [em]...[/em] 같은 태그는 즉시 처리
    // 구현: parseInline 결과를 받고, HTML 그대로 저장한 다음 visible characters를 키움
    const parsed = parseInline(rawText);
    el.innerHTML = '';

    // HTML 태그를 보호하면서 텍스트만 한 글자씩 노출
    // 간단한 방식: 원본을 character 단위로 쪼개되 HTML 태그는 한 묶음으로
    const tokens = tokenizeForTyping(parsed);
    let i = 0;
    let html = '';

    function tick() {
      if (myToken !== typingToken) return;
      if (i >= tokens.length) {
        el.innerHTML = html.replace(/<span class="cursor"><\/span>$/, '');
        if (onDone) setTimeout(() => { if (myToken === typingToken) onDone(); }, 300);
        return;
      }
      const tok = tokens[i];
      // 커서 제거 후 추가
      html = html.replace(/<span class="cursor"><\/span>$/, '');
      html += tok + '<span class="cursor"></span>';
      el.innerHTML = html;
      i++;

      // 다음 글자 딜레이 결정
      let delay = TYPE_SPEED;
      const lastChar = tok.length === 1 ? tok : '';
      if (lastChar === '\n' || tok === '<br>') delay = TYPE_SPEED * 5;
      else if (lastChar === '.' || lastChar === '?' || lastChar === '!') delay = TYPE_SPEED * 4;
      else if (lastChar === ',') delay = TYPE_SPEED * 2;

      typingTimers.push(setTimeout(tick, delay));
    }
    tick();
  }

  // HTML 문자열을 타이핑용 토큰으로 쪼개기
  // <태그>는 한 묶음, 일반 글자는 하나씩
  function tokenizeForTyping(html) {
    const tokens = [];
    let i = 0;
    while (i < html.length) {
      if (html[i] === '<') {
        // 태그 끝까지 한 묶음
        const end = html.indexOf('>', i);
        if (end === -1) { tokens.push(html[i]); i++; }
        else { tokens.push(html.substring(i, end + 1)); i = end + 1; }
      } else if (html[i] === '&') {
        // HTML 엔티티 (&amp; 등)
        const end = html.indexOf(';', i);
        if (end === -1 || end - i > 6) { tokens.push(html[i]); i++; }
        else { tokens.push(html.substring(i, end + 1)); i = end + 1; }
      } else {
        tokens.push(html[i]);
        i++;
      }
    }
    return tokens;
  }

  function renderContext(el, s) {
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      <div class="context-body">
        ${s.year ? `<div class="ctx-year">${escapeHTML(s.year)}</div>` : ''}
        ${s.title ? `<div class="ctx-title">${escapeHTML(s.title)}</div>` : ''}
        ${s.body ? `<div class="ctx-body">${parseInline(s.body)}</div>` : ''}
      </div>
      <div class="nav-area">
        <button class="btn-p solid" id="ctx-next">${getNextLabel()}</button>
      </div>
    `;
    el.querySelector('#ctx-next').onclick = nextScene;
  }

  function renderGame(el, s) {
    let html = `
      ${headerNav()}
      ${progressBar()}
      <div class="game-body">
        <div class="dial-wrap">
    `;

    // 대사 목록
    (s.dialogues || []).forEach(d => {
      if (d.type === 'inner') {
        html += `<div class="inner-voice">${parseInline(d.text)}</div>`;
      } else {
        const cls = d.role || 'npc-a';
        html += `
          <div class="dial ${cls}">
            ${d.who ? `<div class="dial-who">${escapeHTML(d.who)}</div>` : ''}
            <div class="dial-text">${parseInline(d.text)}</div>
          </div>
        `;
      }
    });

    html += `</div>`;

    // 선택지
    if (s.choice) {
      html += `
        <div class="ch-area">
          <div class="ch-label">${parseInline(s.choice.label || '')}</div>
          <div class="ch-list" id="ch-list">
            ${s.choice.options.map((opt, i) => `
              <button class="ch" data-idx="${i}">${parseInline(opt.text)}</button>
            `).join('')}
          </div>
          <div class="block-msg" id="block-msg"></div>
          <div class="no-answer-msg" id="no-answer-msg"></div>
          <div class="no-answer-nav" id="no-answer-nav">
            <button class="btn-p solid" id="ch-next">${getNextLabel()}</button>
          </div>
        </div>
      `;
    }

    html += `</div>`;
    el.innerHTML = html;

    // 이미 선택한 씬으로 돌아온 경우 — 이전 선택을 표시하되 다시 선택 가능
    const wasLocked = state.lockedScenes.has(state.currentSceneIdx);
    const previousChoiceIdx = (s.choice && s.choice.flag) ? state.flags[s.choice.flag] : undefined;

    if (s.choice) {
      // 선택지 클릭 가능하게 바인딩
      el.querySelectorAll('.ch').forEach(btn => {
        btn.onclick = () => handleChoice(s, parseInt(btn.dataset.idx), btn, el);
      });

      // 이전 선택이 있으면 표시 (해당 버튼만 강조, 나머지는 그대로 클릭 가능)
      if (wasLocked && previousChoiceIdx !== undefined) {
        const prevBtn = el.querySelectorAll('.ch')[previousChoiceIdx];
        if (prevBtn) prevBtn.classList.add('previously-chosen');
      }
    } else {
      // 선택지 없는 게임 씬 — 자동 다음
      const navArea = document.createElement('div');
      navArea.className = 'nav-area';
      navArea.innerHTML = `<button class="btn-p solid" id="game-next">${getNextLabel()}</button>`;
      el.appendChild(navArea);
      el.querySelector('#game-next').onclick = nextScene;
    }
  }

  function renderDeep(el, s) {
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      <div class="deep-body">
        ${s.tag ? `<div class="deep-tag">${escapeHTML(s.tag)}</div>` : ''}
        ${s.title ? `<div class="deep-title">${parseInline(s.title)}</div>` : ''}
        ${s.text ? `<div class="deep-text">${parseInline(s.text)}</div>` : ''}
        ${s.quote ? `<div class="deep-quote">${parseInline(s.quote)}</div>` : ''}
      </div>
      <div class="nav-area">
        <button class="btn-p solid" id="deep-next">${getNextLabel()}</button>
      </div>
    `;
    el.querySelector('#deep-next').onclick = () => {
      // 막 완료 기록
      if (s.actId) state.actsCompleted.push(s.actId);
      nextScene();
    };
  }

  function renderEpilogue(el, s) {
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      <div class="epi-body">
        ${s.year ? `<div class="epi-year">${escapeHTML(s.year)}</div>` : ''}
        ${s.title ? `<div class="epi-big">${parseInline(s.title)}</div>` : ''}
        ${(s.paragraphs || []).map(p => `<div class="epi-text">${parseInline(p)}</div>`).join('')}
        ${s.quote ? `<div class="epi-quote">${parseInline(s.quote)}</div>` : ''}
      </div>
      <div class="nav-area">
        <button class="btn-p solid" id="epi-next">완료 →</button>
      </div>
    `;
    el.querySelector('#epi-next').onclick = finish;
  }

  // ─── 선택지 처리 ────────────────────────────────────────
  function handleChoice(scene, idx, btn, sceneEl) {
    const opt = scene.choice.options[idx];

    // "정답 없음" 모드 — 어떤 선택이든 코멘트 보여주고 진행
    if (scene.choice.type === 'reflection') {
      // 이 씬은 선택했음 (뒤로 와도 표시되도록)
      state.lockedScenes.add(state.currentSceneIdx);

      // 다른 버튼 잠금은 안 함 (자유 탐색) — 다만 이전 강조 제거하고 새 강조
      sceneEl.querySelectorAll('.ch').forEach(b => {
        b.classList.remove('locked', 'previously-chosen');
      });
      btn.classList.add('locked');

      // 선택의 결과 메시지
      const msgEl = sceneEl.querySelector('#no-answer-msg');
      if (msgEl) {
        // [b]/[em] 같은 인라인 마크업이 그대로 보이지 않게 파싱해서 넣는다
        msgEl.innerHTML = parseInline(opt.feedback || '당신의 선택이 기록되었습니다.');
        msgEl.classList.add('on');
      }

      // flag 기록
      if (scene.choice.flag) {
        state.flags[scene.choice.flag] = idx;
      }

      // 다음 버튼 표시 (라벨 동적)
      const navEl = sceneEl.querySelector('#no-answer-nav');
      if (navEl) navEl.classList.add('on');

      const nextBtn = sceneEl.querySelector('#ch-next');
      if (nextBtn) {
        nextBtn.textContent = getNextLabel();
        nextBtn.onclick = () => {
          if (opt.jumpTo !== undefined) {
            jumpToScene(opt.jumpTo);
          } else {
            nextScene();
          }
        };
      }
      return;
    }

    // "정답 있음" 모드 — 오답이면 흔들기
    if (opt.correct === false) {
      btn.classList.add('wrong-shake');
      setTimeout(() => btn.classList.remove('wrong-shake'), 400);

      const msgEl = sceneEl.querySelector('#block-msg');
      msgEl.innerHTML = parseInline(opt.blockMessage || '다시 생각해보세요.');
      msgEl.classList.add('on');
      return;
    }

    // 정답 처리
    state.lockedScenes.add(state.currentSceneIdx);

    // 다른 버튼 잠금 안 함 - 다시 시도 가능. 다만 이전 강조 정리.
    sceneEl.querySelectorAll('.ch').forEach(b => {
      b.classList.remove('locked', 'previously-chosen');
    });
    btn.classList.add('locked');

    // block-msg 숨기기
    const blockMsg = sceneEl.querySelector('#block-msg');
    if (blockMsg) blockMsg.classList.remove('on');

    if (scene.choice.flag) {
      state.flags[scene.choice.flag] = idx;
    }

    // 점프가 있으면 (분기 입구 같은 곳)
    if (opt.jumpTo !== undefined) {
      let navEl = sceneEl.querySelector('#no-answer-nav');
      if (!navEl) {
        const chArea = sceneEl.querySelector('.ch-area');
        if (chArea) {
          const newNav = document.createElement('div');
          newNav.className = 'no-answer-nav on';
          newNav.id = 'no-answer-nav';
          newNav.innerHTML = `<button class="btn-p solid" id="ch-next">다음 →</button>`;
          chArea.appendChild(newNav);
        }
      } else {
        navEl.classList.add('on');
      }
      const nextBtn = sceneEl.querySelector('#ch-next');
      if (nextBtn) nextBtn.onclick = () => jumpToScene(opt.jumpTo);
      return;
    }

    // 정답 후 — 다음 버튼 표시 (라벨 동적)
    let navEl = sceneEl.querySelector('#no-answer-nav');
    if (!navEl) {
      // 정답 모드에선 원래 nav 영역이 없으니 추가
      const chArea = sceneEl.querySelector('.ch-area');
      if (chArea) {
        const newNav = document.createElement('div');
        newNav.className = 'no-answer-nav on';
        newNav.id = 'no-answer-nav';
        newNav.innerHTML = `<button class="btn-p solid" id="ch-next">${getNextLabel()}</button>`;
        chArea.appendChild(newNav);
      }
    } else {
      navEl.classList.add('on');
      const existingBtn = navEl.querySelector('#ch-next');
      if (existingBtn) existingBtn.textContent = getNextLabel();
    }

    const nextBtn = sceneEl.querySelector('#ch-next');
    if (nextBtn) {
      nextBtn.onclick = () => nextScene();
    }
  }

  // ─── 씬 이동 ────────────────────────────────────────────
  function nextScene() {
    state.currentSceneIdx++;
    renderScene();
  }

  function jumpToScene(idx) {
    state.currentSceneIdx = idx;
    renderScene();
  }

  // ─── 게임 종료 ──────────────────────────────────────────
  function finish() {
    // 부모 프레임(episode.html)에 종료 신호
    try {
      window.parent.postMessage({
        type: 'game-complete',
        ep: state.data.ep,
        flags: state.flags,
        actsCompleted: state.actsCompleted,
        timestamp: Date.now()
      }, '*');
    } catch (e) {
      console.warn('postMessage failed', e);
    }

    // 최종 화면
    const root = document.getElementById('game-root');
    root.innerHTML = `
      <div class="sc on">
        ${headerNav()}
        <div class="epi-body" style="text-align:center;padding-top:80px;">
          <div class="epi-big">완료</div>
          <div class="epi-text">${escapeHTML(state.data.title || '에피소드')}를 마쳤습니다.</div>
          <div class="nav-area" style="justify-content:center;margin-top:32px;">
            <button class="btn-p solid" onclick="GameEngine.restart()">다시 보기</button>
          </div>
        </div>
      </div>
    `;
  }

  function restart() {
    state.currentSceneIdx = 0;
    state.flags = {};
    state.actsCompleted = [];
    renderScene();
  }

  // ─── 진행바 ─────────────────────────────────────────────
  function updateProgress() {
    const fill = document.querySelector('.prog-fill');
    if (!fill) return;
    const total = state.data.scenes.length;
    const cur = state.currentSceneIdx + 1;
    fill.style.width = (cur / total * 100) + '%';
  }

  // ─── 헤더 네비 (점3개 메뉴 — 평상시 숨김, 호버 시 확장) ─────
  // 구석(우상단)에 점3개 + 현재 위치 라벨만 둔다.
  // 호버/포커스하면 홈·시리즈 링크가 아래로 펼쳐진다.
  function headerNav() {
    // episode.html 등 프레임(iframe) 안에서 실행되면 프레임이 자체 메뉴를
    // 제공하므로 게임 내부 메뉴는 숨긴다(중복 방지). 단독으로 game.html을
    // 직접 열었을 때만 점3개 메뉴를 그린다.
    try { if (window.self !== window.top) return ''; } catch (e) { return ''; }
    const ep = state.data.ep || '';
    const epLabel = 'EP' + (ep < 10 ? '0' + ep : ep);
    const scene = state.data.scenes[state.currentSceneIdx];
    const here = (scene && scene.progLabel) ? scene.progLabel : '';
    return `
      <div class="top-nav">
        <div class="nav-kebab" tabindex="0" role="button" aria-haspopup="true"
             aria-label="메뉴 열기${here ? ' · 현재 ' + escapeHTML(here) : ''}">
          <div class="nav-kebab-head">
            <span class="kebab-dots" aria-hidden="true"><i></i><i></i><i></i></span>
            ${here ? `<span class="nav-here">${escapeHTML(here)}</span>` : ''}
          </div>
          <div class="nav-menu" role="menu">
            <span class="nav-menu-ep">${escapeHTML(epLabel)}</span>
            <a href="../../index.html" target="_top" role="menuitem">← 홈으로</a>
            <a href="../../joseon-kings.html" target="_top" role="menuitem">시리즈 목록 →</a>
          </div>
        </div>
      </div>
    `;
  }

  function progressBar() {
    const canGoBack = canGoBackFromHere();
    // 현재 위치 라벨은 점3개 메뉴(headerNav) 옆으로 옮겼다.
    return `
      <div class="prog">
        ${canGoBack ? '<button class="prog-back" id="prog-back" title="이전 화면으로">↶</button>' : '<span class="prog-back-spacer"></span>'}
        <div class="prog-bar">
          <div class="prog-fill" style="width:0%;"></div>
        </div>
      </div>
    `;
  }

  // 지금 위치에서 뒤로갈 수 있는가
  function canGoBackFromHere() {
    return state.currentSceneIdx > 0;
  }

  function goBack() {
    if (!canGoBackFromHere()) return;
    state.currentSceneIdx--;
    renderScene();
  }

  // 다음 씬의 타입에 따라 버튼 라벨 결정
  // 학생이 무엇을 보러 가는지 알 수 있게 해야 함
  function getNextLabel() {
    const next = state.data.scenes[state.currentSceneIdx + 1];
    if (!next) return '완료 →';
    switch (next.type) {
      case 'narration':
        // 다음이 나레이션이면 — 새 막의 시작
        return '다음 막 →';
      case 'context':
        return '시대 상황 보기 →';
      case 'game':
        return '게임 시작 →';
      case 'deep':
        return '깊게 살펴보기 →';
      case 'epilogue':
        return '에필로그 →';
      default:
        return '다음 →';
    }
  }

  // ─── 인라인 마크업 파서 ──────────────────────────────────
  // [b]진하게[/b], [i]기울임[/i], [em]강조[/em],
  // 또는 *진하게* (마크다운 호환)
  function parseInline(text) {
    if (!text) return '';
    return escapeHTML(text)
      .replace(/\[b\](.+?)\[\/b\]/g,   '<strong>$1</strong>')
      .replace(/\[i\](.+?)\[\/i\]/g,   '<em>$1</em>')
      .replace(/\[em\](.+?)\[\/em\]/g, '<em>$1</em>')
      .replace(/\*\*(.+?)\*\*/g,        '<strong>$1</strong>')
      .replace(/\*([^*\n]+?)\*/g,       '<em>$1</em>')
      .replace(/__(.+?)__/g,            '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function escapeHTML(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── 외부 노출 ──────────────────────────────────────────
  window.GameEngine = {
    start: start,
    restart: restart,
    getState: () => ({ ...state }) // 디버그용
  };

})();

</script>

— 이미 지난 일이다. 다음을 생각해야 한다.","correct":false,"blockMessage":"다음을 생각하는 것은 맞다. 그러나 [b]과거를 기록하지 않으면 다음에도 같은 실수를 한다.[/b] 이순신이 위대한 것은 — [em]잊지 않았기 때문이다.[/em]"}]},"progLabel":"1막 · 첫 패배"},{"type":"narration","era":"2막 · 1590~1592년 · 조선과 일본","text":"1590년, 조선 통신사가 일본에서 돌아왔다.\n정사 황윤길이 보고했다:\n\"히데요시는 이미 전국을 통일했습니다.\n조선 침략의 의도가 분명합니다.\n반드시 전쟁이 있을 것입니다.\"\n\n조정은 이 보고를 무시했다.\n민심이 흔들릴 것을 걱정했다.\n\n[b]당신은 무시하지 않았다.[/b]","svg":"<svg viewBox=\"0 0 640 200\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"640\" height=\"200\" fill=\"#030408\"/><path d=\"M0 90 Q160 70 320 85 Q480 100 640 78 L640 90Z\" fill=\"#050810\"/><rect x=\"0\" y=\"90\" width=\"640\" height=\"110\" fill=\"#040608\"/><path d=\"M80 120 Q200 100 320 120 L323 138 Q200 150 77 138Z\" fill=\"#0c1008\"/><path d=\"M82 120 Q200 102 318 120 L314 108 Q200 88 86 108Z\" fill=\"#0a0e08\"/><line x1=\"145\" y1=\"103\" x2=\"148\" y2=\"120\" stroke=\"#141e10\" stroke-width=\"1\"/><line x1=\"200\" y1=\"97\" x2=\"200\" y2=\"120\" stroke=\"#141e10\" stroke-width=\"1\"/><line x1=\"255\" y1=\"103\" x2=\"252\" y2=\"120\" stroke=\"#141e10\" stroke-width=\"1\"/><line x1=\"85\" y1=\"112\" x2=\"315\" y2=\"112\" stroke=\"#141e10\" stroke-width=\"1\"/><rect x=\"295\" y=\"130\" width=\"14\" height=\"5\" fill=\"#141e18\" rx=\"2\"/><rect x=\"100\" y=\"131\" width=\"14\" height=\"5\" fill=\"#141e18\" rx=\"2\"/><circle cx=\"420\" cy=\"118\" r=\"6\" fill=\"#181408\"/><rect x=\"414\" y=\"124\" width=\"12\" height=\"18\" fill=\"#181408\" rx=\"2\"/></svg>","progLabel":"2막 · 준비한 자"},{"type":"game","dialogues":[{"type":"inner","text":"조정은 무시했다.\n당신은 무시하지 않았다.\n[b]왜인가.[/b]"}],"choice":{"type":"reflection","label":"당신이 전쟁을 확신한 이유는?","flag":"act2_reason","options":[{"text":"특별히 똑똑했기 때문이다 — 상황을 남들보다 더 잘 읽었다.","feedback":"조정에도 똑똑한 사람은 많았다. 그들도 황윤길의 보고를 들었다. [b]차이는 지능이 아니라 경험이었다.[/b]"},{"text":"히데요시가 전국을 통일한 순간, 그 군사력이 향할 곳은 하나였다 — 통일된 군사력은 반드시 출구를 찾는다.","feedback":"도요토미 히데요시가 전국을 통일한 순간, 수십 년 내전으로 단련된 대규모 군사력이 갈 곳을 잃었다. [em]그 힘은 반드시 바깥으로 향한다.[/em] 이순신은 그 논리를 읽었다."},{"text":"녹둔도의 패배에서 배웠다 — 기습을 당한 자는 다음 기습을 두려워하며 준비한다.","feedback":"녹둔도에서 기습을 당한 이순신은 패배를 기록했다. 그 기록이 이후 [em]'적이 언제 어디서 올 수 있는가'[/em]를 끊임없이 생각하게 했다. [b]현명한 사람은 패배에서 지혜를 얻는다.[/b]"}]},"progLabel":"2막 · 준비한 자"},{"type":"narration","era":"3막 · 1597년 봄 · 한성 형장","text":"원균의 모함으로 통제사에서 파직되고\n형장으로 끌려갔다.\n매를 맞았다.\n\n죄명 없는 파직.\n명령: [em]백의종군.[/em]\n흰 옷을 입고 전쟁에 나가라.\n\n난중일기에 기록을 남겼다.\n\"천지가 캄캄하다.\"","svg":"<svg viewBox=\"0 0 640 200\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"640\" height=\"200\" fill=\"#030204\"/><path d=\"M0 100 Q320 82 640 96 L640 100Z\" fill=\"#080606\"/><rect x=\"0\" y=\"100\" width=\"640\" height=\"100\" fill=\"#060404\"/><g stroke=\"#1a2030\" stroke-width=\".6\" opacity=\".35\"><line x1=\"80\" y1=\"0\" x2=\"75\" y2=\"65\"/><line x1=\"200\" y1=\"8\" x2=\"195\" y2=\"73\"/><line x1=\"380\" y1=\"0\" x2=\"375\" y2=\"65\"/><line x1=\"520\" y1=\"5\" x2=\"515\" y2=\"70\"/></g><circle cx=\"320\" cy=\"128\" r=\"8\" fill=\"#1c1c18\"/><rect x=\"312\" y=\"136\" width=\"16\" height=\"26\" fill=\"#1e1e1c\" rx=\"2\"/><circle cx=\"260\" cy=\"135\" r=\"6\" fill=\"#0e0c08\"/><rect x=\"254\" y=\"141\" width=\"12\" height=\"18\" rx=\"1\" fill=\"#0e0c08\"/><circle cx=\"380\" cy=\"135\" r=\"6\" fill=\"#0e0c08\"/><rect x=\"374\" y=\"141\" width=\"12\" height=\"18\" rx=\"1\" fill=\"#0e0c08\"/></svg>","progLabel":"3막 · 모함"},{"type":"game","dialogues":[{"type":"inner","text":"모든 것을 빼앗겼다.\n그 앞에서 — [b]무엇이 남았나.[/b]"}],"choice":{"type":"reflection","label":"모든 것을 빼앗겼다. 그 앞에서 무엇이 남았나?","flag":"act3_remain","options":[{"text":"분노한다 — 나라를 위해 싸웠는데 이게 무슨 대우인가.","feedback":"분노는 당연했다. 이순신은 이 감정을 [em]난중일기[/em]에 기록했다. 그러나 그는 분노에 머물지 않았다. [b]불의에 분노하는 것과 그 분노로 해야 할 일을 놓치는 것은 다르다.[/b]"},{"text":"허탈하다 — 다 이렇게 끝나는 건가. 싸울 이유가 있는가.","feedback":"허탈함은 진짜였다. 그러나 이순신은 '나라를 위해서'가 아니라 [b]'백성을 위해서'[/b]라는 다른 이유를 붙들었다. 충성의 대상이 달랐다. [em]나라가 그를 버려도 자리를 지킬 수 있었던 이유다.[/em]"},{"text":"각오를 다진다 — 그래도 바다는 지켜야 한다.","feedback":"백의종군 중에도 이순신은 [b]지형을 관찰하고 남은 병력을 파악했다.[/b] 각오는 감정이 아니라 행동이었다. 그는 길 위에서도 멈추지 않았다."}]},"progLabel":"3막 · 모함"},{"type":"narration","era":"4막 · 1597년 8월 · 칠천량 패전 소식","text":"칠천량 해전.\n원균이 이끄는 조선 수군이 전멸했다.\n원균, 전사.\n\n남은 배 — [b]열두 척.[/b]\n\n조정이 명령했다:\n\"수군을 폐하고 육군에 합류하라.\"","svg":"<svg viewBox=\"0 0 640 200\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"640\" height=\"200\" fill=\"#030408\"/><path d=\"M0 95 Q320 75 640 90 L640 95Z\" fill=\"#050810\"/><rect x=\"0\" y=\"95\" width=\"640\" height=\"105\" fill=\"#04060c\"/><path d=\"M0 120 Q80 114 160 120 Q240 126 320 118 Q400 110 480 118 Q560 126 640 120\" stroke=\"#0a1828\" stroke-width=\"2\" fill=\"none\"/><g fill=\"#0a1018\" opacity=\".8\"><path d=\"M30 105 Q60 97 90 105 L92 113 Q60 117 28 113Z\"/><path d=\"M100 103 Q128 96 156 103 L157 110 Q128 114 99 110Z\"/><path d=\"M166 106 Q190 99 214 106 L215 112 Q190 116 165 112Z\"/><path d=\"M224 104 Q246 97 268 104 L269 110 Q246 114 223 110Z\"/><path d=\"M278 106 Q298 99 318 106 L319 112 Q298 116 277 112Z\"/><path d=\"M328 104 Q346 98 364 104 L365 110 Q346 114 327 110Z\"/><path d=\"M374 106 Q390 100 406 106 L407 111 Q390 115 373 111Z\"/><path d=\"M416 104 Q430 99 444 104 L445 109 Q430 113 415 109Z\"/><path d=\"M454 106 Q466 101 478 106 L479 111 Q466 115 453 111Z\"/><path d=\"M488 104 Q499 100 510 104 L511 109 Q499 113 487 109Z\"/><path d=\"M520 106 Q530 102 540 106 L541 110 Q530 114 519 110Z\"/><path d=\"M550 104 Q559 100 568 104 L569 109 Q559 113 549 109Z\"/></g><text x=\"320\" y=\"155\" text-anchor=\"middle\" fill=\"#c8a020\" font-size=\"13\" font-family=\"serif\" opacity=\".35\">十二</text></svg>","progLabel":"4막 · 열두 척"},{"type":"game","dialogues":[{"type":"inner","text":"조정의 명령은 합리적이었다.\n12척으로는 330척을 막을 수 없다.\n모두가 알고 있었다.\n[em]당신도 알고 있었다.[/em]"}],"choice":{"label":"당신은 장계를 올린다. 무슨 말을 쓰겠는가?","flag":"act4_jangye","options":[{"text":"수군을 육군에 합류시키겠습니다 — 합리적인 명령에 따르겠습니다.","correct":false,"blockMessage":"수군이 없으면 왜군은 서해를 통해 보급로를 열고 수도까지 올라온다. [b]이순신은 그 지도를 알았다.[/b] 합리적인 명령이 — 전략적으로는 틀릴 수 있다."},{"text":"신에게는 아직 열두 척의 배가 있사옵니다 — 죽기를 각오하고 싸우면 능히 이길 수 있습니다.","correct":true},{"text":"더 많은 병력과 물자를 보내주십시오 — 지원이 있어야 싸울 수 있습니다.","correct":false,"blockMessage":"지원은 오지 않는다. [em]가진 것으로 싸워야 한다.[/em] 없는 것을 기다리는 사람은 싸우지 못한다. 이순신은 [b]있는 것으로 계산했다.[/b]"}]},"progLabel":"4막 · 열두 척"},{"type":"narration","era":"5막 · 1597년 9월 · 명량해협 · 전투 전","text":"울돌목.\n명량해협의 가장 좁은 물길.\n\n당신은 지형을 알고 있었다.\n조류는 여섯 시간마다 방향을 바꾼다.\n좁은 물길에서는 330척도\n한 번에 열 척씩밖에 들어오지 못한다.\n\n준비는 이미 되어 있었다.\n[b]싸움은 싸우기 전에 이미 결정된다.[/b]","svg":"<svg viewBox=\"0 0 640 200\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"640\" height=\"200\" fill=\"#030408\"/><rect x=\"0\" y=\"0\" width=\"640\" height=\"85\" fill=\"#040610\"/><g fill=\"#c0b060\" opacity=\".1\"><circle cx=\"80\" cy=\"18\" r=\"1\"/><circle cx=\"320\" cy=\"12\" r=\"1.2\"/><circle cx=\"540\" cy=\"16\" r=\"1\"/></g><path d=\"M0 85 Q160 68 320 80 Q480 92 640 72 L640 85Z\" fill=\"#050810\"/><rect x=\"0\" y=\"85\" width=\"640\" height=\"115\" fill=\"#04060c\"/><path d=\"M0 115 Q60 108 100 120 Q130 128 160 115 Q200 100 220 115 Q240 125 260 115 Q300 100 340 115 Q370 126 400 115 Q440 100 480 115 Q520 128 560 115 Q600 105 640 118\" stroke=\"#0a1828\" stroke-width=\"2\" fill=\"none\"/><rect x=\"220\" y=\"90\" width=\"80\" height=\"4\" fill=\"#c8a020\" opacity=\".2\" rx=\"2\"/><text x=\"260\" y=\"108\" text-anchor=\"middle\" fill=\"#c8a020\" font-size=\"9\" font-family=\"sans-serif\" opacity=\".5\">울돌목</text><g fill=\"#1a2818\" opacity=\".9\"><path d=\"M80 128 Q120 118 160 128 L162 140 Q120 148 78 140Z\"/><path d=\"M170 126 Q200 117 230 126 L232 137 Q200 145 168 137Z\"/><path d=\"M240 130 Q265 122 290 130 L291 140 Q265 147 239 140Z\"/></g><circle cx=\"420\" cy=\"118\" r=\"7\" fill=\"#181408\"/><rect x=\"413\" y=\"125\" width=\"14\" height=\"22\" fill=\"#181408\" rx=\"2\"/><rect x=\"450\" y=\"110\" width=\"22\" height=\"28\" fill=\"#0c1408\" stroke=\"#203818\" stroke-width=\"1\" rx=\"1\"/><line x1=\"454\" y1=\"116\" x2=\"468\" y2=\"116\" stroke=\"#304828\" stroke-width=\".8\"/><line x1=\"454\" y1=\"120\" x2=\"468\" y2=\"120\" stroke=\"#304828\" stroke-width=\".8\"/><line x1=\"454\" y1=\"124\" x2=\"468\" y2=\"124\" stroke=\"#304828\" stroke-width=\".8\"/><line x1=\"454\" y1=\"128\" x2=\"468\" y2=\"128\" stroke=\"#304828\" stroke-width=\".6\"/></svg>","progLabel":"5막 · 싸움의 준비"},{"type":"game","dialogues":[{"type":"inner","text":"330척이 온다.\n열두 척으로 — [b]어디서 싸울 것인가.[/b]"}],"choice":{"label":"어디서 싸울 것인가","flag":"act5_where","options":[{"text":"넓은 바다에서 — 기동력을 최대한 살린다.","correct":false,"blockMessage":"넓은 바다에서는 [em]330척의 수적 우위가 그대로 살아난다.[/em] 열두 척은 사방에서 포위된다. [b]기동력만으로는 수적 열세를 극복할 수 없다.[/b]"},{"text":"울돌목 좁은 물길에서 — 적이 한 번에 열 척밖에 못 들어오는 곳.","correct":true},{"text":"항구 안에서 방어한다 — 병사들을 보호하며 버틴다.","correct":false,"blockMessage":"항구 안에서 버티면 왜군이 서해를 지나간다. [b]바다를 내주면 전쟁을 잃는다.[/b] 이순신은 지키는 것이 아니라 — [em]막는 것[/em]을 택했다."}]},"progLabel":"5막 · 싸움의 준비"},{"type":"narration","era":"6막 · 1597년 9월 15일 밤 · 명량 앞바다","text":"밤이다.\n내일이면 싸운다.\n\n배 안의 병사들이 잠든 척을 한다.\n그들이 두려워하고 있다는 것을 안다.\n\n[em]당신도 두렵다.[/em]\n그런데 — [b]결단은 흔들리지 않는다.[/b]","svg":"<svg viewBox=\"0 0 640 220\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"640\" height=\"220\" fill=\"#020406\"/><rect x=\"0\" y=\"0\" width=\"640\" height=\"110\" fill=\"#030510\"/><circle cx=\"480\" cy=\"38\" r=\"22\" fill=\"#c8b020\" opacity=\".1\"/><g fill=\"#c0b060\" opacity=\".1\"><circle cx=\"60\" cy=\"18\" r=\"1.2\"/><circle cx=\"200\" cy=\"12\" r=\"1\"/><circle cx=\"320\" cy=\"20\" r=\"1.3\"/></g><path d=\"M0 110 Q160 92 320 105 Q480 118 640 95 L640 110Z\" fill=\"#040810\"/><rect x=\"0\" y=\"110\" width=\"640\" height=\"110\" fill=\"#03050e\"/><path d=\"M0 135 Q80 128 160 135 Q240 142 320 132 Q400 122 480 132 Q560 142 640 135\" stroke=\"#0a1828\" stroke-width=\"1.5\" fill=\"none\"/><circle cx=\"200\" cy=\"118\" r=\"8\" fill=\"#12100c\"/><rect x=\"192\" y=\"126\" width=\"16\" height=\"26\" fill=\"#12100c\" rx=\"2\"/><path d=\"M100 130 Q200 114 300 130 L302 144 Q200 152 98 144Z\" fill=\"#080c10\" opacity=\".7\"/><line x1=\"200\" y1=\"96\" x2=\"200\" y2=\"118\" stroke=\"#2a1e08\" stroke-width=\"1.5\"/><g fill=\"#0a0c10\" opacity=\".6\"><ellipse cx=\"360\" cy=\"162\" rx=\"28\" ry=\"7\" transform=\"rotate(-3,360,162)\"/><ellipse cx=\"430\" cy=\"168\" rx=\"24\" ry=\"6\" transform=\"rotate(5,430,168)\"/><ellipse cx=\"500\" cy=\"160\" rx=\"22\" ry=\"6\" transform=\"rotate(-5,500,160)\"/><ellipse cx=\"560\" cy=\"166\" rx=\"20\" ry=\"6\" transform=\"rotate(2,560,166)\"/></g></svg>","progLabel":"6막 · 결단은 이미"},{"type":"game","dialogues":[{"type":"inner","text":"그 두려움 안에 — [b]무엇이 있었나.[/b]"}],"choice":{"type":"reflection","label":"그 두려움 안에 무엇이 있었나?","flag":"act6_fear","options":[{"text":"죽음이 두렵다 — 내일 내가 죽을 수도 있다.","feedback":"이순신은 죽음을 각오했다. [em]\"죽기를 각오하면 살고, 살기를 꾀하면 죽는다.\"[/em] 이것은 용감한 말이 아니다. [b]두려움을 인정한 말이다.[/b] 그는 신이 아니었다."},{"text":"실패가 두렵다 — 지면 조선이 없다.","feedback":"명량에서 지면 서해가 열리고 왜군이 수도를 향해 올라온다. 이순신은 [b]그 지도를 알았다.[/b] 개인의 죽음보다 더 큰 두려움이었다."},{"text":"병사들이 두렵다 — 내 명령에 이 사람들이 죽는다.","feedback":"배 안의 병사들이 [em]잠든 척하고 있다는 것을 안다.[/em] 두려운 것이다. 그 두려움을 이순신도 안다. 전날 밤 그는 직접 병사들을 찾아다녔다. [b]\"내일 죽지 않을 것이다. 내가 있다.\"[/b]"}]},"progLabel":"6막 · 결단은 이미"},{"type":"epilogue","year":"에필로그 · 1597.9.16 — 1598.11.19","title":"결단은 이미 내려져 있었다","paragraphs":["명량 — 12척 대 330척.\n[b]31척 격침. 아군 피해 없음.[/b]","노량 — 마지막 전투.\n[em]\"지금 싸움이 급하니 내가 죽었다 하지 마라.\"[/em]","그 결단은 [b]그날 내려진 것이 아니었다.[/b]\n그가 살아온 모든 순간의 합이었다.","0막 · 서른둘의 늦깎이 — 치욕과 고집과 확신.\n1막 · 녹둔도의 패배 — 패배에서 지혜를 얻는다.\n2막 · 혼자 준비한 자 — 위기 전에 준비한다.\n3막 · 백의종군의 굴욕 — 충성의 대상은 백성.\n4막 · 열두 척 — 가진 것으로 계산한다.\n5막 · 싸움의 준비 — 울돌목을 골랐다.\n6막 · 명량 전야 — [b]결단은 이미 내려져 있었다.[/b]"],"quote":"必死卽生 必生卽死\n[em]죽기를 각오하면 살고, 살기를 꾀하면 죽는다.[/em]","progLabel":"에필로그"}]};
