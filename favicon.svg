<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="황금 왕관">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7df9e"/>
      <stop offset="0.5" stop-color="#e0b060"/>
      <stop offset="1" stop-color="#a9761c"/>
    </linearGradient>
  </defs>

  <!-- 검정 바탕 (둥근 사각) -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0a0604"/>
  <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="6" fill="none" stroke="#3a2808" stroke-width="0.8"/>

  <!-- 왕관 윗부분 (뾰족한 봉우리) -->
  <path d="M6.8 20.5 L9.8 11 L13.4 16.6 L16 8.2 L18.6 16.6 L22.2 11 L25.2 20.5 Z"
        fill="url(#gold)" stroke="#5e3f10" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- 왕관 띠(밴드) -->
  <rect x="6.3" y="20" width="19.4" height="5" rx="1.4"
        fill="url(#gold)" stroke="#5e3f10" stroke-width="0.7"/>

  <!-- 봉우리 끝 보석(밝은 금) -->
  <circle cx="9.8" cy="10.3" r="1.7" fill="#ffe9ab" stroke="#8a5e1a" stroke-width="0.5"/>
  <circle cx="16"  cy="7.4"  r="2"   fill="#ffe9ab" stroke="#8a5e1a" stroke-width="0.5"/>
  <circle cx="22.2" cy="10.3" r="1.7" fill="#ffe9ab" stroke="#8a5e1a" stroke-width="0.5"/>

  <!-- 띠 중앙 루비 -->
  <circle cx="16" cy="22.4" r="1.7" fill="#c63a2e" stroke="#7a1f18" stroke-width="0.5"/>
</svg>
