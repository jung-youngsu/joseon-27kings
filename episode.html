<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>에피소드 — 역사체험 시리즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:  #0a0604;
  --bg2: #0f0906;
  --bg3: #140c08;
  --accent2: #8a5e1a;
  --accent3: #e0b060;
  --text:  #ece0d0;
  --text2: #c8b89a;
  --text3: #907860;
  --border:  #1e1408;
  --border2: #2e1e0c;
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

body {
  display: flex;
  flex-direction: column;
  max-width: 760px;
  margin: 0 auto;
}

/* ── 상단 점3개 메뉴 (홈/시리즈 + 탭 전부 접음, 호버 시 확장) ──
   .ep-kebab 는 우상단 구석에 머무는 sticky 핀. 평상시엔 점3개 +
   현재 탭 이름만 흐릿하게 보이고, 호버/포커스하면 .ep-menu(EP정보 +
   탭 + 홈/시리즈)가 아래로 펼쳐진다. 펼쳐짐은 absolute 라 콘텐츠를
   밀지 않고, ::before 다리로 호버가 끊기지 않는다. */
.ep-kebab {
  position: sticky;
  top: 6px;
  align-self: flex-end;
  z-index: 60;
  margin: 6px 12px 2px 0;
  padding: 5px 9px;
  border-radius: 13px;
  background: var(--bg2);
  border: 1px solid transparent;
  color: var(--text3);
  cursor: pointer;
  outline: none;
  transition: background .2s ease, border-color .2s ease, color .2s ease;
}
.ep-kebab:hover,
.ep-kebab:focus-within {
  background: var(--bg3);
  border-color: var(--accent2);
  color: var(--text2);
}
.ep-kebab-head {
  display: flex;
  flex-direction: row-reverse;   /* 점은 구석에, 라벨은 그 왼쪽 */
  align-items: center;
  gap: 8px;
}
.kebab-dots {
  display: inline-flex;
  flex-direction: column;
  gap: 2.5px;
  flex-shrink: 0;
}
.kebab-dots i {
  display: block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: currentColor;
}
.ep-here {
  font-size: 11px;
  letter-spacing: 1px;
  white-space: nowrap;
  color: inherit;
}
/* 펼쳐지는 메뉴 */
.ep-menu {
  position: absolute;
  top: 100%;
  right: 0;
  width: 210px;
  margin-top: 7px;
  padding: 10px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  box-shadow: 0 12px 32px rgba(0,0,0,.55);
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}
.ep-menu::before {            /* head ↔ menu 사이 호버 다리 */
  content: "";
  position: absolute;
  top: -9px;
  left: 0;
  right: 0;
  height: 9px;
}
.ep-kebab:hover .ep-menu,
.ep-kebab:focus-within .ep-menu,
.ep-menu:hover {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.ep-menu-info {
  padding: 2px 6px 8px;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 7px;
}
.ep-num {
  font-family: 'Noto Serif KR', serif;
  font-size: 11px;
  color: var(--accent3);
  letter-spacing: 2px;
  font-weight: 600;
}
.ep-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text);
  margin-top: 2px;
  font-weight: 500;
}
.ep-menu-tabs {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 7px;
}
.ep-tab {
  padding: 8px 10px;
  text-align: left;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  color: var(--text2);
  background: var(--bg3);
  border: 1px solid transparent;
  border-radius: 7px;
  cursor: pointer;
  letter-spacing: 1px;
  white-space: nowrap;
  transition: all .15s;
}
.ep-tab:hover { color: var(--text); border-color: var(--border2); }
.ep-tab.active {
  color: var(--accent3);
  border-color: var(--accent2);
  background: var(--bg2);
}
.ep-menu-links {
  display: flex;
  justify-content: space-between;
  padding-top: 8px;
  border-top: 1px solid var(--border2);
}
.ep-menu-links a {
  color: var(--text3);
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 1px;
  transition: color .15s;
}
.ep-menu-links a:hover { color: var(--accent3); }

/* ── 탭 컨텐츠 ── */
.tab-pane {
  display: none;
  flex: 1;
  flex-direction: column;
  min-height: 0;
}
.tab-pane.active { display: flex; }

/* 게임 (iframe) */
.game-frame {
  flex: 1;
  width: 100%;
  border: none;
  min-height: 600px;
  background: var(--bg);
}

/* 이벤트 코드 게이트 */
.game-gate {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 600px;
  padding: 40px 20px;
}
.gate-card {
  width: 100%;
  max-width: 340px;
  text-align: center;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 36px 26px;
}
.gate-glyph { font-size: 38px; line-height: 1; }
.gate-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  color: var(--accent3);
  letter-spacing: 1px;
  margin-top: 14px;
  font-weight: 600;
}
.gate-sub { font-size: 12px; color: var(--text3); margin-top: 8px; line-height: 1.6; }
.gate-input {
  width: 100%;
  margin-top: 20px;
  padding: 13px 14px;
  background: var(--bg);
  border: 1px solid var(--border3);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  letter-spacing: 5px;
  text-align: center;
  text-transform: uppercase;
  outline: none;
}
.gate-input:focus { border-color: var(--accent3); }
.gate-btn {
  width: 100%;
  margin-top: 12px;
  padding: 13px;
  background: var(--accent2);
  color: #1a1206;
  border: none;
  border-radius: 9px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: filter .15s;
}
.gate-btn:hover { filter: brightness(1.12); }
.gate-btn:disabled { opacity: .5; cursor: default; }
.gate-msg { font-size: 12px; margin-top: 12px; min-height: 16px; letter-spacing: .5px; }
.gate-msg.ok { color: var(--accent3); }
.gate-msg.err { color: #f07060; }
.gate-hint { font-size: 11px; color: var(--text3); margin-top: 14px; line-height: 1.6; }

/* 텍스트 컨텐츠 (소설, 자료) */
.content-body {
  padding: 32px 24px;
  font-family: 'Noto Serif KR', serif;
  line-height: 2.2;
  color: var(--text2);
  font-size: 14px;
}
.content-body h1, .content-body h2, .content-body h3 {
  font-family: 'Noto Serif KR', serif;
  color: var(--text);
  margin: 28px 0 14px;
  line-height: 1.5;
}
.content-body h1 { font-size: 22px; font-weight: 700; }
.content-body h2 { font-size: 18px; font-weight: 600; }
.content-body h3 { font-size: 15px; font-weight: 600; color: var(--accent3); }
.content-body p { margin-bottom: 18px; }
.content-body em { color: var(--text); font-style: normal; font-weight: 500; }
.content-body strong { color: var(--accent3); font-weight: 600; }
.content-body blockquote {
  margin: 20px 0;
  padding: 14px 20px;
  border-left: 2px solid var(--accent2);
  background: var(--bg2);
  font-style: italic;
  color: var(--text3);
}
.content-body hr {
  border: none;
  border-top: 1px solid var(--border2);
  margin: 32px 0;
}

/* 빈 상태 */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  text-align: center;
  color: var(--text3);
  font-family: 'Noto Serif KR', serif;
}
.empty-state-glyph {
  font-size: 32px;
  color: var(--accent2);
  margin-bottom: 16px;
}
.empty-state-title {
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 8px;
}
.empty-state-sub {
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: 1px;
}

/* 퀴즈 */
.quiz-area { padding: 24px 20px; }
.quiz-q {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.7;
  font-weight: 600;
}
.quiz-num {
  display: inline-block;
  font-size: 11px;
  color: var(--accent3);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.quiz-ch-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 24px; }
.quiz-ch {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 12px 14px;
  text-align: left;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.quiz-ch:hover { background: var(--bg3); color: var(--text); }
.quiz-ch.selected { border-color: var(--accent3); color: var(--text); }
.quiz-ch.correct { border-color: var(--accent3); background: rgba(224,176,96,0.1); }
.quiz-ch.wrong { opacity: 0.5; }
.quiz-explain {
  margin-top: 8px;
  padding: 12px 16px;
  background: var(--bg2);
  border-left: 2px solid var(--accent3);
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.9;
  display: none;
}
.quiz-explain.show { display: block; }
.quiz-divider {
  height: 1px;
  background: var(--border2);
  margin: 28px 0;
}

/* ═══ 새 퀴즈 — 한 문제씩 카드 + 타이머 + 리더보드 ═════════════ */
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.quiz-intro, .quiz-result {
  padding: 36px 22px;
  text-align: center;
}
.quiz-intro-tag, .quiz-result-tag {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent3);
  margin-bottom: 14px;
}
.quiz-intro-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
}
.quiz-intro-rules {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text2);
  line-height: 2.1;
  margin: 0 auto 22px;
  max-width: 340px;
}
.quiz-intro-rules strong { color: var(--accent3); font-weight: 600; }
.quiz-mybest {
  display: inline-block;
  padding: 9px 18px;
  background: var(--bg2);
  border: 1px solid var(--accent2);
  border-radius: 4px;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--accent3);
  margin-bottom: 22px;
}
.quiz-start-btn {
  padding: 14px 38px;
  background: var(--accent2);
  color: var(--bg);
  border: none;
  border-radius: 24px;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  margin: 6px;
  transition: all .2s;
}
.quiz-start-btn:hover { background: var(--accent3); }
.quiz-back-btn {
  padding: 10px 22px;
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border2);
  border-radius: 22px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  cursor: pointer;
  margin: 6px;
}
.quiz-back-btn:hover { color: var(--accent3); border-color: var(--accent3); }

/* 카드 */
.quiz-card {
  padding: 28px 22px;
}
.quiz-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.quiz-progress {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
}
.quiz-timer {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  color: var(--accent3);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.quiz-card-prog {
  height: 2px;
  background: var(--border2);
  margin-bottom: 26px;
  border-radius: 1px;
  overflow: hidden;
}
.quiz-card-prog-fill {
  height: 100%;
  background: var(--accent2);
  transition: width .4s ease;
}
.quiz-card-q {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 22px;
  min-height: 60px;
}
.quiz-card-choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.quiz-card-ch {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 16px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  text-align: left;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.quiz-card-ch:hover:not(:disabled) {
  background: var(--bg3);
  border-color: var(--border2);
  color: var(--text);
}
.quiz-card-ch:disabled { cursor: not-allowed; opacity: 0.6; }
.quiz-card-ch-num {
  font-weight: 700;
  color: var(--text3);
  flex-shrink: 0;
  width: 18px;
}
.quiz-card-ch-text { flex: 1; line-height: 1.6; }
.quiz-card-ch.correct {
  border-color: #70a85a;
  background: rgba(112,168,90,0.10);
  color: #b0d090;
  opacity: 1 !important;
}
.quiz-card-ch.correct .quiz-card-ch-num { color: #b0d090; }
.quiz-card-ch.wrong {
  border-color: #c87060;
  background: rgba(200,112,96,0.08);
  color: #d09080;
  animation: shake .35s ease;
  opacity: 1 !important;
}
.quiz-card-ch.wrong .quiz-card-ch-num { color: #d09080; }
.quiz-lock-msg {
  display: none;
  padding: 11px 14px;
  background: var(--bg2);
  border-left: 2px solid #c87060;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: #d09080;
  line-height: 1.8;
  text-align: center;
  margin-top: 10px;
}
.quiz-lock-msg.on { display: block; }

/* 결과 */
.quiz-result-time {
  font-family: 'Courier New', monospace;
  font-size: 52px;
  font-weight: 700;
  color: var(--accent3);
  line-height: 1;
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.quiz-result-score {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  color: var(--text);
  margin-bottom: 10px;
}
.quiz-result-newbest {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  font-weight: 700;
  color: #b0d090;
  margin-bottom: 6px;
}
.quiz-result-rank {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 18px;
}
.quiz-result-anon {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 18px;
}

/* 리더보드 */
.quiz-lb {
  margin-top: 28px;
  padding: 16px 14px 4px;
  text-align: left;
  border-top: 1px solid var(--border);
}
.quiz-lb-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent3);
  margin-bottom: 12px;
  letter-spacing: 1.5px;
  text-align: center;
}
.quiz-lb-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
}
.quiz-lb-table th {
  padding: 8px 6px;
  text-align: left;
  font-weight: 500;
  color: var(--text3);
  font-size: 10px;
  letter-spacing: 1.5px;
  border-bottom: 1px solid var(--border2);
}
.quiz-lb-table td {
  padding: 9px 6px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.quiz-lb-table .lb-rank {
  width: 36px;
  color: var(--text3);
  font-weight: 700;
  font-family: 'Courier New', monospace;
}
.quiz-lb-table .lb-time {
  width: 80px;
  text-align: right;
  font-family: 'Courier New', monospace;
  color: var(--accent3);
}
.quiz-lb-table tr.me {
  background: rgba(224,176,96,0.10);
}
.quiz-lb-table tr.me .lb-rank,
.quiz-lb-table tr.me .lb-name,
.quiz-lb-table tr.me .lb-time {
  color: var(--accent3);
  font-weight: 700;
}
.quiz-lb-empty {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--text3);
  padding: 16px;
  text-align: center;
  border: 1px dashed var(--border2);
  border-radius: 4px;
}
</style>
</head>
<body>

<!-- ═══ 상단 점3개 메뉴 (평상시 숨김, 호버 시 확장) ═══════════
     홈/시리즈 + 탭(게임·소설·퀴즈·심화·후기)을 모두 한 곳으로 접음.
     평상시엔 구석에 점3개 + 현재 탭 이름만 흐릿하게 보인다. -->
<div class="ep-kebab" tabindex="0" role="button" aria-haspopup="true" aria-label="메뉴 열기">
  <div class="ep-kebab-head">
    <span class="kebab-dots" aria-hidden="true"><i></i><i></i><i></i></span>
    <span class="ep-here" id="ep-here">게임</span>
  </div>
  <div class="ep-menu" role="menu">
    <div class="ep-menu-info">
      <div class="ep-num" id="ep-num">EP--</div>
      <div class="ep-title" id="ep-title">로딩 중...</div>
    </div>
    <div class="ep-menu-tabs">
      <button class="ep-tab active" data-tab="game">게임</button>
      <button class="ep-tab" data-tab="novel">소설</button>
      <button class="ep-tab" data-tab="quiz">퀴즈</button>
      <button class="ep-tab" data-tab="study">심화</button>
      <button class="ep-tab" data-tab="reviews">후기</button>
    </div>
    <div class="ep-menu-links">
      <a href="index.html">← 홈</a>
      <a href="joseon-kings.html">시리즈 →</a>
    </div>
  </div>
</div>

<!-- ═══ 탭 컨텐츠 ═══════════════════════════════════════════ -->
<div class="tab-pane active" id="pane-game">
  <div class="game-gate" id="game-gate" style="display:none;">
    <div class="gate-card">
      <div class="gate-glyph">🎟</div>
      <div class="gate-title">이벤트 접속 코드</div>
      <div class="gate-sub" id="gate-sub">이 게임은 이벤트 코드로 입장할 수 있어요.</div>
      <input type="text" id="gate-input" class="gate-input" placeholder="코드 입력" autocomplete="off" autocapitalize="characters" spellcheck="false">
      <button class="gate-btn" id="gate-btn">입장하기</button>
      <div class="gate-msg" id="gate-msg"></div>
      <div class="gate-hint">코드를 입력하면 이 기기에서 <b>7일간</b> 접속됩니다.</div>
    </div>
  </div>

// ═══ 이벤트 접속 코드 게이트 ═══════════════════════════════════
//   - 이 기기에 유효한 해제기록(7일)이 있으면 바로 게임 로드
//   - 없으면 이 게임이 '코드 전용'인지 Supabase에 묻고(is_ep_gated),
//     전용이면 코드 입력창을 띄움. 코드가 맞으면 7일 해제 후 로드.
//   - Supabase가 없거나 오류면 게이트 없이 로드(fail-open).
const UNLOCK_DAYS = 7;
function unlockKey(ep){ return 'j27_unlock_ep' + ep; }
function deviceUnlockValid(ep){
  try{
    const o = JSON.parse(localStorage.getItem(unlockKey(ep)) || 'null');
    return !!(o && o.until && o.until > Date.now());
  }catch(e){ return false; }
}
function setDeviceUnlock(ep){
  const until = Date.now() + UNLOCK_DAYS*24*60*60*1000;
  try{ localStorage.setItem(unlockKey(ep), JSON.stringify({until})); }catch(e){}
}

async function gateOrLoadGame(ep, gameUrl){
  const frame = document.getElementById('game-frame');
  const gate  = document.getElementById('game-gate');
  const reveal = () => {
    if(gate) gate.style.display = 'none';
    frame.style.display = '';
    frame.src = gameUrl;
  };

  // 이미 이 기기에서 해제됨
  if(deviceUnlockValid(ep)){ reveal(); return; }

  // 이 게임이 코드 전용인가?
  let gated = false;
  if(window.sb){
    try{
      const { data, error } = await window.sb.rpc('is_ep_gated', { p_ep: ep });
      if(!error) gated = !!data;
    }catch(e){ /* fail-open */ }
  }
  if(!gated){ reveal(); return; }

  // 게이트 표시
  frame.style.display = 'none';
  frame.src = 'about:blank';
  gate.style.display = '';
  const input = document.getElementById('gate-input');
  const btn   = document.getElementById('gate-btn');
  const msg   = document.getElementById('gate-msg');
  input.value = '';
  msg.textContent = ''; msg.className = 'gate-msg';

  async function tryCode(){
    const code = (input.value || '').trim().toUpperCase();
    if(!code) return;
    btn.disabled = true; msg.textContent = '확인 중...'; msg.className = 'gate-msg';
    let ok = false;
    try{
      const { data, error } = await window.sb.rpc('check_access_code', { p_code: code, p_ep: ep });
      ok = !error && !!data;
    }catch(e){}
    if(ok){
      setDeviceUnlock(ep);
      msg.textContent = '입장합니다 — 이 기기에서 7일간 접속 가능';
      msg.className = 'gate-msg ok';
      setTimeout(reveal, 700);
    }else{
      btn.disabled = false;
      msg.textContent = '코드가 올바르지 않거나 만료됐어요.';
      msg.className = 'gate-msg err';
    }
  }
  btn.onclick = tryCode;
  input.onkeydown = (e) => { if(e.key === 'Enter') tryCode(); };
  input.focus();
}

  startTime: 0,
  timerInterval: null,
  lockInterval: null,
  locked: false,

};

// 사용자 식별 + 같은 EP의 리더보드 로드 (Supabase 없으면 비활성)
async function loadUserAndLeaderboard() {
  if (window.sb) {
    try {
      const { data: { session } } = await window.sb.auth.getSession();
      if (session) {
        quizState.myUserId = session.user.id;
        quizState.myNickname = session.user.user_metadata?.nickname
          || session.user.email?.split('@')[0]
          || '나';
      }

  }

async function fetchLeaderboard() {
  if (!window.sb || !quizState.data) {
    quizState.leaderboard = [];
    return;
  }
  try {
    const { data: rows, error } = await window.sb
      .from('quiz_records')
      .select('user_id, elapsed')
      .eq('episode', quizState.data.ep)
      .eq('perfect', true)
      .order('elapsed', { ascending: true })
      .limit(50);
    if (error) { quizState.leaderboard = []; return; }
    // 한 사용자 한 row 가정이지만, 안전하게 user_id별 최단만 남김
    const seen = new Set();
    const dedup = [];
    for (const r of (rows || [])) {
      if (seen.has(r.user_id)) continue;
      seen.add(r.user_id);
      dedup.push(r);
    }
    quizState.leaderboard = dedup;
  } catch (e) {
    quizState.leaderboard = [];
  }
}

function maskName(uid, idx) {
  if (!uid) return `도전자 ${String(idx + 1).padStart(4, '0')}`;
  return `도전자 ${uid.slice(0, 4).toUpperCase()}`;
}

function findMyEntry() {
  if (!quizState.myUserId) return null;
  const i = quizState.leaderboard.findIndex(r => r.user_id === quizState.myUserId);
  if (i < 0) return null;
  return { rank: i + 1, row: quizState.leaderboard[i] };
}

function renderLeaderboard() {
  if (!quizState.leaderboard.length) {
    return `
      <div class="quiz-lb">
        <div class="quiz-lb-title">🏆 리더보드</div>
        <div class="quiz-lb-empty">아직 완주 기록이 없어요. 첫 1위가 되어보세요.</div>
      </div>`;
  }
  const rows = quizState.leaderboard.slice(0, 10).map((r, i) => {
    const isMe = r.user_id === quizState.myUserId;
    const name = isMe ? (quizState.myNickname || '나') : maskName(r.user_id, i);
    return `
      <tr class="${isMe ? 'me' : ''}">
        <td class="lb-rank">${i + 1}</td>
        <td class="lb-name">${escapeHTML(name)}${isMe ? ' (나)' : ''}</td>
        <td class="lb-time">${r.elapsed.toFixed(1)}초</td>
      </tr>`;
  }).join('');
  return `
    <div class="quiz-lb">
      <div class="quiz-lb-title">🏆 리더보드 TOP 10</div>
      <table class="quiz-lb-table">
        <thead><tr><th>순위</th><th>도전자</th><th>시간</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderQuizIntro() {

  const my = findMyEntry();

    <div class="quiz-intro">
      <div class="quiz-intro-tag">${escapeHTML(data.title || '퀴즈')}</div>
      <div class="quiz-intro-title">${data.questions.length}문제 도전</div>
      <div class="quiz-intro-rules">
        모든 문제를 맞히면 — 시간이 기록됩니다.<br>
        오답을 누르면 <strong>3초간 다른 답을 선택할 수 없어요.</strong><br>
        가장 짧은 시간에 완주한 사람이 <strong>1위</strong>.
      </div>

      ${renderLeaderboard()}
    </div>`;
}

function startQuiz() {
  quizState.idx = 0;
  quizState.correct = 0;
  quizState.startTime = Date.now();
  quizState.locked = false;
  clearInterval(quizState.lockInterval);
  startQuizTimer();
  renderQuizQuestion();
}

function startQuizTimer() {
  clearInterval(quizState.timerInterval);
  quizState.timerInterval = setInterval(() => {
    const el = document.getElementById('quiz-timer');
    if (el) {
      const elapsed = (Date.now() - quizState.startTime) / 1000;
      el.textContent = elapsed.toFixed(1) + '초';
    }
  }, 100);
}

function renderQuizQuestion() {
  const target = document.getElementById('quiz-content');
  if (!target) return;
  const data = quizState.data;
  const q = data.questions[quizState.idx];
  const total = data.questions.length;
  const progPct = (quizState.idx / total) * 100;
  const nums = '①②③④⑤⑥⑦⑧⑨⑩';

  target.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-card-head">
        <span class="quiz-progress">문제 ${quizState.idx + 1} / ${total}</span>
        <span class="quiz-timer" id="quiz-timer">0.0초</span>
      </div>
      <div class="quiz-card-prog">
        <div class="quiz-card-prog-fill" style="width:${progPct}%"></div>
      </div>
      <div class="quiz-card-q">${escapeHTML(q.q)}</div>
      <div class="quiz-card-choices">
        ${q.choices.map((c, i) => `
          <button class="quiz-card-ch" data-idx="${i}" data-correct="${i === q.answer}">
            <span class="quiz-card-ch-num">${nums[i] || (i+1)}</span>
            <span class="quiz-card-ch-text">${escapeHTML(c)}</span>
          </button>`).join('')}
      </div>
      <div class="quiz-lock-msg" id="quiz-lock-msg"></div>
    </div>`;

  target.querySelectorAll('.quiz-card-ch').forEach(btn => {
    btn.onclick = () => handleQuizPick(btn);
  });
}

function handleQuizPick(btn) {
  if (quizState.locked) return;
  const isCorrect = btn.dataset.correct === 'true';
  const allBtns = document.querySelectorAll('.quiz-card-ch');

  if (isCorrect) {
    btn.classList.add('correct');
    quizState.correct++;
    quizState.locked = true;
    allBtns.forEach(b => b.disabled = true);
    setTimeout(() => {
      quizState.idx++;
      quizState.locked = false;
      if (quizState.idx >= quizState.data.questions.length) {
        finishQuiz();
      } else {
        renderQuizQuestion();
      }
    }, 600);
    return;
  }

  // 오답 — 3초 락
  btn.classList.add('wrong');
  quizState.locked = true;
  allBtns.forEach(b => b.disabled = true);
  const msgEl = document.getElementById('quiz-lock-msg');
  let remaining = 3;
  if (msgEl) {
    msgEl.textContent = `오답입니다. ${remaining}초 후 다시 선택할 수 있어요.`;
    msgEl.classList.add('on');
  }
  clearInterval(quizState.lockInterval);
  quizState.lockInterval = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      if (msgEl) msgEl.textContent = `오답입니다. ${remaining}초 후 다시 선택할 수 있어요.`;
    } else {
      clearInterval(quizState.lockInterval);
      if (msgEl) {
        msgEl.classList.remove('on');
        msgEl.textContent = '';
      }
      btn.classList.remove('wrong');
      allBtns.forEach(b => { b.disabled = false; });
      quizState.locked = false;
    }
  }, 1000);
}

async function finishQuiz() {
  clearInterval(quizState.timerInterval);
  const elapsed = parseFloat(((Date.now() - quizState.startTime) / 1000).toFixed(1));
  // "정답 맞춰야 다음" 모델이라 끝까지 오면 perfect 보장
  const perfect = (quizState.correct === quizState.data.questions.length);
  let isNewBest = false;
  if (perfect && window.sb && quizState.myUserId) {
    isNewBest = await saveBestRecord(elapsed);
    await fetchLeaderboard();
  }
  renderQuizResult(elapsed, isNewBest);
}

// 최고 기록만 갱신 (수동 upsert: select → 비교 → update/insert)
async function saveBestRecord(elapsed) {
  if (!window.sb || !quizState.myUserId) return false;
  const ep = quizState.data.ep;
  try {
    const { data: existing } = await window.sb
      .from('quiz_records')
      .select('id, elapsed')
      .eq('user_id', quizState.myUserId)
      .eq('episode', ep)
      .order('elapsed', { ascending: true })
      .limit(1)
      .maybeSingle();

    if (!existing) {
      await window.sb.from('quiz_records').insert({
        user_id: quizState.myUserId,
        episode: ep,
        elapsed: elapsed,
        perfect: true,
        ep_given: 0
      });
      return true;
    } else if (elapsed < existing.elapsed) {
      await window.sb.from('quiz_records')
        .update({ elapsed: elapsed })
        .eq('id', existing.id);
      return true;
    }
  } catch (e) {
    console.warn('saveBestRecord failed', e);
  }
  return false;
}

function renderQuizResult(elapsed, isNewBest) {
  const target = document.getElementById('quiz-content');
  if (!target) return;
  const my = findMyEntry();
  target.innerHTML = `
    <div class="quiz-result">
      <div class="quiz-result-tag">완주!</div>
      <div class="quiz-result-time">${elapsed.toFixed(1)}초</div>
      <div class="quiz-result-score">${quizState.correct} / ${quizState.data.questions.length} 정답</div>
      ${isNewBest ? '<div class="quiz-result-newbest">🎉 신기록!</div>' : ''}
      ${my ? `<div class="quiz-result-rank">현재 ${my.rank}위 · 내 최고 ${my.row.elapsed.toFixed(1)}초</div>` : ''}
      ${!quizState.myUserId ? '<div class="quiz-result-anon">로그인하면 기록이 저장됩니다.</div>' : ''}
      <div>
        <button class="quiz-start-btn" onclick="startQuiz()">↺ 다시 도전</button>
        <button class="quiz-back-btn" onclick="renderQuizIntro()">← 시작 화면</button>
      </div>
      ${renderLeaderboard()}
    </div>`;
}

// 매우 간단한 마크다운 → HTML
function simpleMarkdown(md) {
  let html = md.split('\n');
  let out = [];
  let inBQ = false;
  for (let line of html) {
    if (/^### /.test(line)) out.push('<h3>' + escapeHTML(line.slice(4)) + '</h3>');
    else if (/^## /.test(line)) out.push('<h2>' + escapeHTML(line.slice(3)) + '</h2>');
    else if (/^# /.test(line)) out.push('<h1>' + escapeHTML(line.slice(2)) + '</h1>');
    else if (/^---+$/.test(line.trim())) out.push('<hr>');
    else if (/^> /.test(line)) out.push('<blockquote>' + processInline(line.slice(2)) + '</blockquote>');
    else if (line.trim() === '') out.push('');
    else out.push('<p>' + processInline(line) + '</p>');
  }
  return out.join('\n');
}

function processInline(s) {
  return escapeHTML(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>');
}

function escapeHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
