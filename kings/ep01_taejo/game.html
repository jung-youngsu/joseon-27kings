<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>당신이 이성계라면? — 의리의 왕</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ① 톤 (이 EP의 색상) -->
<link rel="stylesheet" href="../../shared/themes/cold-iron.css">

<!-- ② 공통 스타일 (구조, 레이아웃) -->
<link rel="stylesheet" href="../../shared/style.css">

<!-- (선택) ③ 이 EP만의 추가 스타일 — 필요할 때 만듦 -->
<!-- <link rel="stylesheet" href="style.css"> -->

</head>
<body>

<!-- 게임이 그려질 자리 -->
<div id="game-root"></div>

<!-- 공통 엔진 -->
<script src="../../shared/engine.js"></script>

<!-- 시나리오 로드 후 게임 시작 -->
<script>
fetch('scenes.json')
  .then(r => r.json())
  .then(data => {
    GameEngine.start(data);
  })
  .catch(err => {
    document.getElementById('game-root').innerHTML = `
      <div style="padding:40px;text-align:center;color:#c87060;font-family:'Noto Serif KR',serif;">
        <div style="font-size:18px;margin-bottom:12px;">시나리오 파일을 불러올 수 없습니다.</div>
        <div style="font-size:13px;opacity:0.6;">scenes.json: ${err.message}</div>
      </div>
    `;
    console.error(err);
  });
</script>

</body>
</html>
