<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정도전 — 도면의 사람</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<!-- theme: cold-iron -->
<style>
/* ═══════════════════════════════════════════════════════════════
   shared/themes/cold-iron.css
   톤: 차갑고 단단함 — 전쟁, 야망, 결단의 무게

   적합한 EP: 태조(이성계), 태종(이방원), 세조, 연산군 등
═══════════════════════════════════════════════════════════════ */

:root {
  --bg:  #0a0604;
  --bg2: #0f0906;
  --bg3: #140c08;

  --accent2: #8a5e1a;
  --accent3: #e0b060;

  --text:  #ece0d0;
  --text2: #c8b89a;
  --text3: #907860;

  --border:  #1e1408;
  --border2: #2e1e0c;
  --border3: #4e3418;

  --good2: #208848;
  --good3: #70f080;

  --bad2: #803020;
  --bad3: #f07060;

  --hist2: #3a2808;
  --hist3: #c09040;
}

</style>

<!-- shared/style.css -->
<style>
/* ═══════════════════════════════════════════════════════════════
   shared/style.css
   조선 27왕 시리즈 — 공통 스타일 (1층)

   원칙:
   - 구조, 레이아웃, 여백, 글꼴, 애니메이션은 여기서 정의
   - 색상은 변수(--var)로만 사용. 실제 색은 themes/*.css에서 정함
   - EP 고유 효과는 kings/ep??/style.css에서 추가
═══════════════════════════════════════════════════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── 변수 기본값 (themes에서 덮어씀) ────────────────────────── */
:root {
  /* 배경 3단계 */
  --bg:  #0a0604;
  --bg2: #0f0906;
  --bg3: #140c08;

  /* 강조색 (시대/막 표시, 진행바, 인용) */
  --accent2: #8a5e1a;
  --accent3: #e0b060;

  /* 텍스트 3단계 */
  --text:  #ece0d0;
  --text2: #c8b89a;
  --text3: #907860;

  /* 테두리 3단계 */
  --border:  #1e1408;
  --border2: #2e1e0c;
  --border3: #4e3418;

  /* 정답 (성취 색) */
  --good2: #208848;
  --good3: #70f080;

  /* 오답 (경고 색) */
  --bad2: #803020;
  --bad3: #f07060;

  /* 사료/원문 박스 */
  --hist2: #3a2808;
  --hist3: #c09040;

  /* 글꼴 */
  --font-serif: 'Noto Serif KR', serif;
  --font-sans:  'Noto Sans KR', sans-serif;
}

html { background: var(--bg); }
html, body { min-height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  max-width: 640px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ═══ 씬 시스템 ═══════════════════════════════════════════════
   .sc 는 한 씬. display:none/flex로만 전환.
   position:fixed 안 씀 → 창 크기와 무관하게 동작.
   min-height:100vh + overflow:visible → 짧으면 채우고 길면 스크롤.
═══════════════════════════════════════════════════════════════ */
.sc {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg);
  opacity: 0;
  transition: opacity 0.35s ease;
}
.sc.on { display: flex; opacity: 1; }

@keyframes fi    { from { opacity: 0; } to { opacity: 1; } }
@keyframes fi-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ═══ 진행바 ═══════════════════════════════════════════════ */
.prog {
  flex-shrink: 0;
  background: var(--bg);
  padding: 8px 20px 6px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.prog-bar {
  flex: 1;
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}
.prog-back {
  background: transparent;
  border: 1px solid var(--border3);
  color: var(--text3);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  font-family: var(--font-serif);
  line-height: 1;
}
.prog-back:hover {
  border-color: var(--accent3);
  color: var(--accent3);
  transform: translateX(-2px);
}
.prog-back-spacer {
  width: 28px;
  height: 28px;
}
.prog-fill {
  height: 100%;
  background: var(--accent2);
  transition: width .6s ease;
}

/* ═══ 상단 네비 — 점3개 메뉴 (평상시 숨김, 호버 시 확장) ═══════
   .top-nav 는 높이 0짜리 sticky 앵커. 실제 버튼(.nav-kebab)은
   그 위에 떠서 우상단 구석에 머문다. 평상시엔 점3개 + 현재 위치
   라벨만 흐릿하게 보이고, 호버/포커스하면 메뉴가 아래로 펼쳐진다.
   .nav-menu 는 absolute 가 아닌 in-flow(접힘) 라서 호버가 끊기지
   않고, .nav-kebab 자체가 absolute 라 펼쳐져도 콘텐츠를 밀지 않는다. */
.top-nav {
  position: sticky;
  top: 0;
  height: 0;
  overflow: visible;
  z-index: 30;
}
.nav-kebab {
  position: absolute;
  top: 6px;
  right: 12px;
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 5px 9px;
  border-radius: 13px;
  background: var(--bg);          /* 뒤 진행바 선을 가리되 페이지색과 섞임 */
  border: 1px solid transparent;
  color: var(--text3);            /* 평상시 흐릿 */
  cursor: pointer;
  outline: none;
  font-family: var(--font-sans);
  -webkit-tap-highlight-color: transparent;
  transition: background .2s ease, border-color .2s ease, color .2s ease;
}
.nav-kebab:hover,
.nav-kebab:focus-within {
  background: var(--bg2);
  border-color: var(--border3);
  color: var(--text2);
}
.nav-kebab-head {
  display: flex;
  flex-direction: row-reverse;    /* 점은 구석에, 라벨은 그 왼쪽 */
  align-items: center;
  gap: 8px;
}
.kebab-dots {
  display: inline-flex;
  flex-direction: column;
  gap: 2.5px;
  flex-shrink: 0;
}
.kebab-dots i {
  display: block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: currentColor;
}
.nav-here {
  font-size: 11px;
  letter-spacing: 1px;
  white-space: nowrap;
  color: inherit;
}
/* 펼쳐지는 메뉴 — 평상시 접힘 */
.nav-menu {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  width: 138px;
  max-height: 0;
  margin-top: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height .2s ease, opacity .2s ease, margin-top .2s ease;
}
.nav-kebab:hover .nav-menu,
.nav-kebab:focus-within .nav-menu {
  max-height: 160px;
  margin-top: 8px;
  opacity: 1;
}
.nav-menu-ep {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text3);
  padding: 2px 8px 6px;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 2px;
}
.nav-menu a {
  display: block;
  padding: 7px 8px;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text2);
  text-decoration: none;
  white-space: nowrap;
  border-radius: 7px;
  transition: background .15s ease, color .15s ease;
}
.nav-menu a:hover {
  background: var(--bg3);
  color: var(--accent3);
}

/* ═══ 나레이션 씬 ═══════════════════════════════════════════ */
/* narration.svg 필드용 아트워크 컨테이너 (EP1 5막 실루엣 등) */
.narr-art {
  flex-shrink: 0;
  background: #060402;
  border-bottom: 1px solid var(--border);
}
.narr-art svg {
  width: 100%;
  display: block;
  max-height: 180px;
}

.narr-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 80px 28px 32px;
}
.narr-era {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text3);
  margin-bottom: 18px;
}
.narr-text {
  font-family: var(--font-serif);
  font-size: 19px;
  line-height: 2.6;
  color: var(--text2);
  min-height: 200px;
}
.narr-text em {
  color: var(--text);
  font-style: normal;
  font-weight: 600;
}
.narr-text strong {
  color: var(--accent3);
  font-weight: 600;
}
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent3);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .7s step-end infinite;
}
.nav-area {
  flex-shrink: 0;
  padding: 16px 24px 32px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ═══ 시대상황 씬 ═══════════════════════════════════════════ */
.context-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 50px 28px 32px;
}
.ctx-year {
  font-family: var(--font-serif);
  font-size: 52px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 20px;
}
.ctx-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: .5px;
}
.ctx-body {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text2);
  line-height: 2.3;
}
.ctx-body strong {
  color: var(--text);
  font-weight: 400;
}

/* ═══ 게임 씬 (대사 + 선택지) ═══════════════════════════════ */
.game-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 24px 0;
}
.dial-wrap {
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-bottom: 16px;
}
.dial {
  border-radius: 6px;
  padding: 13px 16px;
  animation: fi-up .3s ease;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-left: 2px solid var(--text3);
}
/* 화자 종류별 좌측 막대 색 (themes에서 다르게 줄 수 있음) */
.dial.npc-a  { border-left-color: var(--accent3); }
.dial.npc-b  { border-left-color: var(--good3); }
.dial.npc-c  { border-left-color: #8870b0; }
.dial.king   { border-left-color: var(--accent2); background: var(--bg3); }
.dial.father { border-left-color: var(--hist3); }

.dial-who {
  font-size: 10px;
  letter-spacing: 2px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text3);
}
.dial.npc-a  .dial-who { color: var(--accent3); }
.dial.npc-b  .dial-who { color: var(--good3); }
.dial.npc-c  .dial-who { color: #9878b8; }
.dial.king   .dial-who { color: var(--accent3); }
.dial.father .dial-who { color: var(--hist3); }

.dial-text {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text);
  line-height: 2;
}

/* 내면 독백 (방과의 시선) */
.inner-voice {
  margin: 0 0 14px;
  padding: 11px 15px;
  border-left: 2px solid var(--hist2);
  background: var(--bg2);
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text3);
  line-height: 2.1;
  font-style: italic;
  animation: fi .4s ease;
}

/* ═══ 선택지 ═══════════════════════════════════════════════ */
.ch-area { padding: 16px 0 32px; }
.ch-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  font-family: var(--font-serif);
  letter-spacing: .3px;
  line-height: 1.6;
}
.ch-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.ch {
  width: 100%;
  text-align: left;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 13px 15px;
  color: var(--text2);
  font-family: var(--font-serif);
  font-size: 14px;
  line-height: 1.7;
  cursor: pointer;
  transition: all .15s;
}
.ch:hover:not(.locked):not(.blocked) {
  background: var(--bg3);
  border-color: var(--border3);
  color: var(--text);
}
.ch.locked {
  background: var(--hist2);
  border-color: var(--hist2);
  color: var(--hist3);
  cursor: default;
}
.ch.previously-chosen {
  border-left: 2px solid var(--accent3);
  background: var(--bg3);
  color: var(--text);
  position: relative;
}
.ch.previously-chosen::before {
  content: '✓';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent3);
  font-size: 13px;
  opacity: 0.6;
}
.ch.blocked { opacity: .25; cursor: default; pointer-events: none; }
.ch.wrong-shake { animation: shake .35s ease; }

.block-msg {
  display: none;
  margin-top: 10px;
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border3);
  border-radius: 5px;
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  animation: fi .3s ease;
}
.block-msg.on { display: block; }

/* "정답 없음" 막의 코멘트 */
.no-answer-msg {
  display: none;
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--bg2);
  border: 1px solid var(--border3);
  border-radius: 5px;
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--text2);
  line-height: 2;
  animation: fi .3s ease;
}
.no-answer-msg.on { display: block; }
.no-answer-nav { display: none; margin-top: 12px; }
.no-answer-nav.on { display: flex; gap: 8px; }

/* ═══ 깊게 살펴보기 (게임 씬 안에서 펼쳐짐) ═══════════════════ */
.deep-reveal {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 1.2s ease, opacity 1.2s ease;
  margin-top: 0;
}
.deep-reveal.on {
  max-height: 5000px;
  opacity: 1;
  margin-top: 24px;
}
.deep-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border3), transparent);
  margin: 8px 0 24px;
}
.deep-reveal .nav-area {
  padding: 24px 0 0;
  margin-top: 8px;
}

/* ═══ 깊게 살펴보기 (별도 씬 - 호환용) ═══════════════════════ */
.deep-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 28px 24px;
}
.deep-tag {
  font-size: 11px;
  letter-spacing: 2px;
  font-weight: 500;
  margin-bottom: 10px;
  color: var(--accent3);
}
.deep-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 14px;
}
.deep-text {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text2);
  line-height: 2.3;
}
.deep-text em { color: var(--text3); font-style: italic; }
.deep-quote {
  margin-top: 16px;
  padding: 12px 16px;
  border-left: 2px solid var(--accent2);
  background: var(--bg2);
  font-family: var(--font-serif);
  font-size: 13px;
  color: var(--accent3);
  line-height: 2;
  font-style: italic;
}

/* ═══ 오프닝 씬 ═══════════════════════════════════════════════ */
.opening {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
}

/* 순차 등장 베이스 */
.fade-target {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 1s ease, transform 1s ease;
}
.fade-target.on {
  opacity: 1;
  transform: translateY(0);
}

.op-question {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 24px;
  letter-spacing: .5px;
  line-height: 1.8;
}
.op-glyph {
  font-family: var(--font-serif);
  font-size: 64px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 20px;
}
.op-series {
  font-size: 11px;
  color: var(--accent3);
  letter-spacing: 3px;
  margin-bottom: 36px;
}

/* 흐름형 lines — 한 줄씩 세로로 자연스럽게 등장 */
.op-lines {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 36px;
  max-width: 480px;
}
.op-line-stacked {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--text2);
  line-height: 2.0;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 1s ease, transform 1s ease;
  text-align: center;
}
.op-line-stacked.on {
  opacity: 1;
  transform: translateY(0);
}
.op-line-stacked em {
  color: var(--accent3);
  font-style: normal;
}
.op-line-stacked strong {
  color: var(--text);
  font-weight: 600;
}

.op-start {
  margin-top: 8px;
}

/* opening portal — s.portal:true 일 때 glyph 자리에 들어가는 회전 포탈 */
.op-portal-wrap {
  width: 100px;
  height: 100px;
  margin: 0 auto 24px;
  position: relative;
}
.op-portal {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.op-portal-ring-out {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-top-color: var(--accent2);
  border-right-color: var(--accent2);
  animation: spin 2s linear infinite;
}
.op-portal-ring-mid {
  position: absolute;
  inset: 14px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: var(--accent3);
  border-left-color: var(--accent3);
  animation: spin 1.4s linear infinite reverse;
}
.op-glyph-in-portal {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  color: var(--accent3);
  line-height: 1;
  position: relative;
  z-index: 1;
}
@keyframes spin {
  from { transform: rotate(0); }
  to   { transform: rotate(360deg); }
}

.op-disc {
  font-size: 12px;
  color: var(--accent3);
  margin-top: 14px;
  line-height: 1.9;
}

/* ═══ 에필로그 씬 ═══════════════════════════════════════════ */
.epi-body { flex: 1; padding: 28px; }
.epi-year {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent3);
  margin-bottom: 12px;
}
.epi-big {
  font-family: var(--font-serif);
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 14px;
}
.epi-text {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text2);
  line-height: 2.2;
  margin-bottom: 14px;
}
.epi-quote {
  padding: 12px 18px;
  border-top: 1px solid var(--border3);
  border-bottom: 1px solid var(--border3);
  font-family: var(--font-serif);
  font-size: 14px;
  font-weight: 600;
  color: var(--accent3);
  line-height: 1.9;
  margin-bottom: 14px;
}

/* ═══ 공통 버튼 ═══════════════════════════════════════════════ */
.btn-p {
  padding: 11px 24px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all .2s;
  background: var(--bg2);
  border: 1px solid var(--border3);
  color: var(--accent3);
}
.btn-p:hover { background: var(--bg3); border-color: var(--accent3); }
.btn-p.ghost { background: transparent; }
.btn-p.solid { background: var(--accent2); color: var(--bg); border-color: var(--accent2); }
.btn-p.solid:hover { background: var(--accent3); border-color: var(--accent3); }

</style>

</head>
<body>

<div id="game-root"></div>

<!-- shared/engine.js -->
<script>
/* ═══════════════════════════════════════════════════════════════
   shared/engine.js
   조선 27왕 시리즈 — 게임 엔진

   역할:
   - scenes.json 데이터를 받아 게임을 화면에 그림
   - 씬 간 전환, 선택지 처리, 진행률 계산
   - 게임 종료 시 부모(episode.html)에게 신호 전송

   사용법:
   1. HTML에 빈 div 하나만 두면 됨: <div id="game-root"></div>
   2. window.GameEngine.start(scenesData) 호출
   3. 끝나면 자동으로 부모 프레임에 'game-complete' 메시지 발송
═══════════════════════════════════════════════════════════════ */

(function() {
  'use strict';

  // ─── 상태 ────────────────────────────────────────────────
  const state = {
    data: null,           // scenes.json 전체
    currentSceneIdx: 0,   // 현재 씬 인덱스
    flags: {},            // 학생의 선택 기록
    actsCompleted: [],    // 완료한 막 ID 목록
    lockedScenes: new Set(),  // 선택을 이미 한 씬 (뒤로가기 제한용)
    visitedScenes: new Set()  // 이미 본 씬 (타이핑 스킵용)
  };

  // ─── 엔진 시작 ───────────────────────────────────────────
  function start(scenesData) {
    state.data = scenesData;
    state.currentSceneIdx = 0;
    state.flags = {};
    state.actsCompleted = [];
    state.lockedScenes = new Set();
    state.visitedScenes = new Set();
    renderScene();
  }

  // ─── 현재 씬 렌더링 ─────────────────────────────────────
  function renderScene() {
    const scene = state.data.scenes[state.currentSceneIdx];
    if (!scene) {
      finish();
      return;
    }

    const root = document.getElementById('game-root');
    if (!root) {
      console.error('GameEngine: #game-root not found');
      return;
    }

    // 모든 씬은 .sc 클래스로
    root.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'sc';

    // 씬 타입별 처리
    switch (scene.type) {
      case 'opening':    renderOpening(el, scene);    break;
      case 'narration':  renderNarration(el, scene);  break;
      case 'context':    renderContext(el, scene);    break;
      case 'game':       renderGame(el, scene);       break;
      case 'deep':       renderDeep(el, scene);       break;
      case 'epilogue':   renderEpilogue(el, scene);   break;
      default:
        el.innerHTML = `<div style="padding:20px;color:#f80;">알 수 없는 씬 타입: ${scene.type}</div>`;
    }

    root.appendChild(el);
    requestAnimationFrame(() => el.classList.add('on'));

    // 진행바 업데이트
    updateProgress();

    // 뒤로가기 버튼 이벤트
    const backBtn = el.querySelector('#prog-back');
    if (backBtn) backBtn.onclick = goBack;

    // 이 씬을 방문 목록에 추가
    state.visitedScenes.add(state.currentSceneIdx);

    // 스크롤 맨 위로
    window.scrollTo(0, 0);
  }

  // ─── 씬 타입별 렌더 ────────────────────────────────────────

  function renderOpening(el, s) {
    const linesHTML = (s.lines || []).map((l, i) =>
      `<div class="op-line-stacked" data-i="${i}">${parseInline(l)}</div>`
    ).join('');

    // s.portal: true 면 glyph 자리에 회전 포탈 (EP1 환생씬 흡수용)
    const glyphOrPortalHTML = s.portal
      ? `<div class="op-portal-wrap fade-target" data-step="1">
           <div class="op-portal">
             <div class="op-portal-ring-out"></div>
             <div class="op-portal-ring-mid"></div>
             ${s.glyph ? `<div class="op-glyph-in-portal">${escapeHTML(s.glyph)}</div>` : ''}
           </div>
         </div>`
      : (s.glyph ? `<div class="op-glyph fade-target" data-step="1">${escapeHTML(s.glyph)}</div>` : '');

    el.innerHTML = `
      <div class="opening">
        ${s.question ? `<div class="op-question fade-target" data-step="0">${escapeHTML(s.question)}</div>` : ''}
        ${glyphOrPortalHTML}
        ${s.series ? `<div class="op-series fade-target" data-step="2">${escapeHTML(s.series)}</div>` : ''}
        ${linesHTML ? `<div class="op-lines">${linesHTML}</div>` : ''}
        <button class="btn-p solid op-start fade-target" data-step="9" id="op-next">시작 →</button>
      </div>
    `;

    // 순차 등장
    const targets = el.querySelectorAll('.fade-target');
    targets.forEach(t => {
      const step = parseInt(t.dataset.step);
      setTimeout(() => t.classList.add('on'), 200 + step * 600);
    });
    const linesEls = el.querySelectorAll('.op-line-stacked');
    linesEls.forEach((line, i) => {
      // glyph/question/series 다음에 lines가 한 줄씩
      setTimeout(() => line.classList.add('on'), 200 + (3 + i) * 600);
    });
    // 시작 버튼은 lines 다 끝난 다음
    const startBtn = el.querySelector('.op-start');
    if (startBtn) {
      const totalLines = linesEls.length;
      setTimeout(() => startBtn.classList.add('on'), 200 + (3 + totalLines + 1) * 600);
    }

    if (startBtn) startBtn.onclick = nextScene;
  }

  function renderNarration(el, s) {
    // s.svg: raw SVG 문자열을 본문 위 아트워크로 삽입 (EP1 5막 실루엣용)
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      ${s.svg ? `<div class="narr-art">${s.svg}</div>` : ''}
      <div class="narr-body">
        ${s.era ? `<div class="narr-era">${escapeHTML(s.era)}</div>` : ''}
        <div class="narr-text" id="narr-target"></div>
      </div>
      <div class="nav-area" id="narr-nav" style="display:none;">
        <button class="btn-p solid" id="narr-next">${getNextLabel()}</button>
      </div>
    `;
    el.querySelector('#narr-next').onclick = nextScene;

    const target = el.querySelector('#narr-target');
    const navEl = el.querySelector('#narr-nav');

    // 이미 본 씬이면 타이핑 스킵 — 즉시 전체 표시
    if (state.visitedScenes.has(state.currentSceneIdx)) {
      target.innerHTML = parseInline(s.text || '');
      navEl.style.display = '';
      navEl.classList.add('fade-target', 'on');
      return;
    }

    // 처음 보는 씬 — 타이핑 효과
    typeText(target, s.text || '', () => {
      navEl.style.display = '';
      navEl.classList.add('fade-target', 'on');
    });
  }

  // 타이핑 효과 (이성계편 방식)
  let typingTimers = [];
  let typingToken = 0;
  const TYPE_SPEED = 44;

  function typeText(el, rawText, onDone) {
    typingTimers.forEach(clearTimeout);
    typingTimers = [];
    typingToken++;
    const myToken = typingToken;

    // 인라인 마크업 미리 파싱 (그대로 두고 글자만 진행)
    // 단순화: 한 글자씩 보여주되, [em]...[/em] 같은 태그는 즉시 처리
    // 구현: parseInline 결과를 받고, HTML 그대로 저장한 다음 visible characters를 키움
    const parsed = parseInline(rawText);
    el.innerHTML = '';

    // HTML 태그를 보호하면서 텍스트만 한 글자씩 노출
    // 간단한 방식: 원본을 character 단위로 쪼개되 HTML 태그는 한 묶음으로
    const tokens = tokenizeForTyping(parsed);
    let i = 0;
    let html = '';

    function tick() {
      if (myToken !== typingToken) return;
      if (i >= tokens.length) {
        el.innerHTML = html.replace(/<span class="cursor"><\/span>$/, '');
        if (onDone) setTimeout(() => { if (myToken === typingToken) onDone(); }, 300);
        return;
      }
      const tok = tokens[i];
      // 커서 제거 후 추가
      html = html.replace(/<span class="cursor"><\/span>$/, '');
      html += tok + '<span class="cursor"></span>';
      el.innerHTML = html;
      i++;

      // 다음 글자 딜레이 결정
      let delay = TYPE_SPEED;
      const lastChar = tok.length === 1 ? tok : '';
      if (lastChar === '\n' || tok === '<br>') delay = TYPE_SPEED * 5;
      else if (lastChar === '.' || lastChar === '?' || lastChar === '!') delay = TYPE_SPEED * 4;
      else if (lastChar === ',') delay = TYPE_SPEED * 2;

      typingTimers.push(setTimeout(tick, delay));
    }
    tick();
  }

  // HTML 문자열을 타이핑용 토큰으로 쪼개기
  // <태그>는 한 묶음, 일반 글자는 하나씩
  function tokenizeForTyping(html) {
    const tokens = [];
    let i = 0;
    while (i < html.length) {
      if (html[i] === '<') {
        // 태그 끝까지 한 묶음
        const end = html.indexOf('>', i);
        if (end === -1) { tokens.push(html[i]); i++; }
        else { tokens.push(html.substring(i, end + 1)); i = end + 1; }
      } else if (html[i] === '&') {
        // HTML 엔티티 (&amp; 등)
        const end = html.indexOf(';', i);
        if (end === -1 || end - i > 6) { tokens.push(html[i]); i++; }
        else { tokens.push(html.substring(i, end + 1)); i = end + 1; }
      } else {
        tokens.push(html[i]);
        i++;
      }
    }
    return tokens;
  }

  function renderContext(el, s) {
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      <div class="context-body">
        ${s.year ? `<div class="ctx-year">${escapeHTML(s.year)}</div>` : ''}
        ${s.title ? `<div class="ctx-title">${escapeHTML(s.title)}</div>` : ''}
        ${s.body ? `<div class="ctx-body">${parseInline(s.body)}</div>` : ''}
      </div>
      <div class="nav-area">
        <button class="btn-p solid" id="ctx-next">${getNextLabel()}</button>
      </div>
    `;
    el.querySelector('#ctx-next').onclick = nextScene;
  }

  function renderGame(el, s) {
    let html = `
      ${headerNav()}
      ${progressBar()}
      <div class="game-body">
        <div class="dial-wrap">
    `;

    // 대사 목록
    (s.dialogues || []).forEach(d => {
      if (d.type === 'inner') {
        html += `<div class="inner-voice">${parseInline(d.text)}</div>`;
      } else {
        const cls = d.role || 'npc-a';
        html += `
          <div class="dial ${cls}">
            ${d.who ? `<div class="dial-who">${escapeHTML(d.who)}</div>` : ''}
            <div class="dial-text">${parseInline(d.text)}</div>
          </div>
        `;
      }
    });

    html += `</div>`;

    // 선택지
    if (s.choice) {
      html += `
        <div class="ch-area">
          <div class="ch-label">${parseInline(s.choice.label || '')}</div>
          <div class="ch-list" id="ch-list">
            ${s.choice.options.map((opt, i) => `
              <button class="ch" data-idx="${i}">${parseInline(opt.text)}</button>
            `).join('')}
          </div>
          <div class="block-msg" id="block-msg"></div>
          <div class="no-answer-msg" id="no-answer-msg"></div>
          <div class="no-answer-nav" id="no-answer-nav">
            <button class="btn-p solid" id="ch-next">${getNextLabel()}</button>
          </div>
        </div>
      `;
    }

    html += `</div>`;
    el.innerHTML = html;

    // 이미 선택한 씬으로 돌아온 경우 — 이전 선택을 표시하되 다시 선택 가능
    const wasLocked = state.lockedScenes.has(state.currentSceneIdx);
    const previousChoiceIdx = (s.choice && s.choice.flag) ? state.flags[s.choice.flag] : undefined;

    if (s.choice) {
      // 선택지 클릭 가능하게 바인딩
      el.querySelectorAll('.ch').forEach(btn => {
        btn.onclick = () => handleChoice(s, parseInt(btn.dataset.idx), btn, el);
      });

      // 이전 선택이 있으면 표시 (해당 버튼만 강조, 나머지는 그대로 클릭 가능)
      if (wasLocked && previousChoiceIdx !== undefined) {
        const prevBtn = el.querySelectorAll('.ch')[previousChoiceIdx];
        if (prevBtn) prevBtn.classList.add('previously-chosen');
      }
    } else {
      // 선택지 없는 게임 씬 — 자동 다음
      const navArea = document.createElement('div');
      navArea.className = 'nav-area';
      navArea.innerHTML = `<button class="btn-p solid" id="game-next">${getNextLabel()}</button>`;
      el.appendChild(navArea);
      el.querySelector('#game-next').onclick = nextScene;
    }
  }

  function renderDeep(el, s) {
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      <div class="deep-body">
        ${s.tag ? `<div class="deep-tag">${escapeHTML(s.tag)}</div>` : ''}
        ${s.title ? `<div class="deep-title">${parseInline(s.title)}</div>` : ''}
        ${s.text ? `<div class="deep-text">${parseInline(s.text)}</div>` : ''}
        ${s.quote ? `<div class="deep-quote">${parseInline(s.quote)}</div>` : ''}
      </div>
      <div class="nav-area">
        <button class="btn-p solid" id="deep-next">${getNextLabel()}</button>
      </div>
    `;
    el.querySelector('#deep-next').onclick = () => {
      // 막 완료 기록
      if (s.actId) state.actsCompleted.push(s.actId);
      nextScene();
    };
  }

  function renderEpilogue(el, s) {
    el.innerHTML = `
      ${headerNav()}
      ${progressBar()}
      <div class="epi-body">
        ${s.year ? `<div class="epi-year">${escapeHTML(s.year)}</div>` : ''}
        ${s.title ? `<div class="epi-big">${parseInline(s.title)}</div>` : ''}
        ${(s.paragraphs || []).map(p => `<div class="epi-text">${parseInline(p)}</div>`).join('')}
        ${s.quote ? `<div class="epi-quote">${parseInline(s.quote)}</div>` : ''}
      </div>
      <div class="nav-area">
        <button class="btn-p solid" id="epi-next">완료 →</button>
      </div>
    `;
    el.querySelector('#epi-next').onclick = finish;
  }

  // ─── 선택지 처리 ────────────────────────────────────────
  function handleChoice(scene, idx, btn, sceneEl) {
    const opt = scene.choice.options[idx];

    // "정답 없음" 모드 — 어떤 선택이든 코멘트 보여주고 진행
    if (scene.choice.type === 'reflection') {
      // 이 씬은 선택했음 (뒤로 와도 표시되도록)
      state.lockedScenes.add(state.currentSceneIdx);

      // 다른 버튼 잠금은 안 함 (자유 탐색) — 다만 이전 강조 제거하고 새 강조
      sceneEl.querySelectorAll('.ch').forEach(b => {
        b.classList.remove('locked', 'previously-chosen');
      });
      btn.classList.add('locked');

      // 선택의 결과 메시지
      const msgEl = sceneEl.querySelector('#no-answer-msg');
      if (msgEl) {
        msgEl.textContent = opt.feedback || '당신의 선택이 기록되었습니다.';
        msgEl.classList.add('on');
      }

      // flag 기록
      if (scene.choice.flag) {
        state.flags[scene.choice.flag] = idx;
      }

      // 다음 버튼 표시 (라벨 동적)
      const navEl = sceneEl.querySelector('#no-answer-nav');
      if (navEl) navEl.classList.add('on');

      const nextBtn = sceneEl.querySelector('#ch-next');
      if (nextBtn) {
        nextBtn.textContent = getNextLabel();
        nextBtn.onclick = () => {
          if (opt.jumpTo !== undefined) {
            jumpToScene(opt.jumpTo);
          } else {
            nextScene();
          }
        };
      }
      return;
    }

    // "정답 있음" 모드 — 오답이면 흔들기
    if (opt.correct === false) {
      btn.classList.add('wrong-shake');
      setTimeout(() => btn.classList.remove('wrong-shake'), 400);

      const msgEl = sceneEl.querySelector('#block-msg');
      msgEl.textContent = opt.blockMessage || '다시 생각해보세요.';
      msgEl.classList.add('on');
      return;
    }

    // 정답 처리
    state.lockedScenes.add(state.currentSceneIdx);

    // 다른 버튼 잠금 안 함 - 다시 시도 가능. 다만 이전 강조 정리.
    sceneEl.querySelectorAll('.ch').forEach(b => {
      b.classList.remove('locked', 'previously-chosen');
    });
    btn.classList.add('locked');

    // block-msg 숨기기
    const blockMsg = sceneEl.querySelector('#block-msg');
    if (blockMsg) blockMsg.classList.remove('on');

    if (scene.choice.flag) {
      state.flags[scene.choice.flag] = idx;
    }

    // 점프가 있으면 (분기 입구 같은 곳)
    if (opt.jumpTo !== undefined) {
      let navEl = sceneEl.querySelector('#no-answer-nav');
      if (!navEl) {
        const chArea = sceneEl.querySelector('.ch-area');
        if (chArea) {
          const newNav = document.createElement('div');
          newNav.className = 'no-answer-nav on';
          newNav.id = 'no-answer-nav';
          newNav.innerHTML = `<button class="btn-p solid" id="ch-next">다음 →</button>`;
          chArea.appendChild(newNav);
        }
      } else {
        navEl.classList.add('on');
      }
      const nextBtn = sceneEl.querySelector('#ch-next');
      if (nextBtn) nextBtn.onclick = () => jumpToScene(opt.jumpTo);
      return;
    }

    // 정답 후 — 다음 버튼 표시 (라벨 동적)
    let navEl = sceneEl.querySelector('#no-answer-nav');
    if (!navEl) {
      // 정답 모드에선 원래 nav 영역이 없으니 추가
      const chArea = sceneEl.querySelector('.ch-area');
      if (chArea) {
        const newNav = document.createElement('div');
        newNav.className = 'no-answer-nav on';
        newNav.id = 'no-answer-nav';
        newNav.innerHTML = `<button class="btn-p solid" id="ch-next">${getNextLabel()}</button>`;
        chArea.appendChild(newNav);
      }
    } else {
      navEl.classList.add('on');
      const existingBtn = navEl.querySelector('#ch-next');
      if (existingBtn) existingBtn.textContent = getNextLabel();
    }

    const nextBtn = sceneEl.querySelector('#ch-next');
    if (nextBtn) {
      nextBtn.onclick = () => nextScene();
    }
  }

  // ─── 씬 이동 ────────────────────────────────────────────
  function nextScene() {
    state.currentSceneIdx++;
    renderScene();
  }

  function jumpToScene(idx) {
    state.currentSceneIdx = idx;
    renderScene();
  }

  // ─── 게임 종료 ──────────────────────────────────────────
  function finish() {
    // 부모 프레임(episode.html)에 종료 신호
    try {
      window.parent.postMessage({
        type: 'game-complete',
        ep: state.data.ep,
        flags: state.flags,
        actsCompleted: state.actsCompleted,
        timestamp: Date.now()
      }, '*');
    } catch (e) {
      console.warn('postMessage failed', e);
    }

    // 최종 화면
    const root = document.getElementById('game-root');
    root.innerHTML = `
      <div class="sc on">
        ${headerNav()}
        <div class="epi-body" style="text-align:center;padding-top:80px;">
          <div class="epi-big">완료</div>
          <div class="epi-text">${escapeHTML(state.data.title || '에피소드')}를 마쳤습니다.</div>
          <div class="nav-area" style="justify-content:center;margin-top:32px;">
            <button class="btn-p solid" onclick="GameEngine.restart()">다시 보기</button>
          </div>
        </div>
      </div>
    `;
  }

  function restart() {
    state.currentSceneIdx = 0;
    state.flags = {};
    state.actsCompleted = [];
    renderScene();
  }

  // ─── 진행바 ─────────────────────────────────────────────
  function updateProgress() {
    const fill = document.querySelector('.prog-fill');
    if (!fill) return;
    const total = state.data.scenes.length;
    const cur = state.currentSceneIdx + 1;
    fill.style.width = (cur / total * 100) + '%';
  }

  // ─── 헤더 네비 (점3개 메뉴 — 평상시 숨김, 호버 시 확장) ─────
  // 구석(우상단)에 점3개 + 현재 위치 라벨만 둔다.
  // 호버/포커스하면 홈·시리즈 링크가 아래로 펼쳐진다.
  function headerNav() {
    const ep = state.data.ep || '';
    const epLabel = 'EP' + (ep < 10 ? '0' + ep : ep);
    const scene = state.data.scenes[state.currentSceneIdx];
    const here = (scene && scene.progLabel) ? scene.progLabel : '';
    return `
      <div class="top-nav">
        <div class="nav-kebab" tabindex="0" role="button" aria-haspopup="true"
             aria-label="메뉴 열기${here ? ' · 현재 ' + escapeHTML(here) : ''}">
          <div class="nav-kebab-head">
            <span class="kebab-dots" aria-hidden="true"><i></i><i></i><i></i></span>
            ${here ? `<span class="nav-here">${escapeHTML(here)}</span>` : ''}
          </div>
          <div class="nav-menu" role="menu">
            <span class="nav-menu-ep">${escapeHTML(epLabel)}</span>
            <a href="../../index.html" target="_top" role="menuitem">← 홈으로</a>
            <a href="../../joseon-kings.html" target="_top" role="menuitem">시리즈 목록 →</a>
          </div>
        </div>
      </div>
    `;
  }

  function progressBar() {
    const canGoBack = canGoBackFromHere();
    // 현재 위치 라벨은 점3개 메뉴(headerNav) 옆으로 옮겼다.
    return `
      <div class="prog">
        ${canGoBack ? '<button class="prog-back" id="prog-back" title="이전 화면으로">↶</button>' : '<span class="prog-back-spacer"></span>'}
        <div class="prog-bar">
          <div class="prog-fill" style="width:0%;"></div>
        </div>
      </div>
    `;
  }

  // 지금 위치에서 뒤로갈 수 있는가
  function canGoBackFromHere() {
    return state.currentSceneIdx > 0;
  }

  function goBack() {
    if (!canGoBackFromHere()) return;
    state.currentSceneIdx--;
    renderScene();
  }

  // 다음 씬의 타입에 따라 버튼 라벨 결정
  // 학생이 무엇을 보러 가는지 알 수 있게 해야 함
  function getNextLabel() {
    const next = state.data.scenes[state.currentSceneIdx + 1];
    if (!next) return '완료 →';
    switch (next.type) {
      case 'narration':
        // 다음이 나레이션이면 — 새 막의 시작
        return '다음 막 →';
      case 'context':
        return '시대 상황 보기 →';
      case 'game':
        return '게임 시작 →';
      case 'deep':
        return '깊게 살펴보기 →';
      case 'epilogue':
        return '에필로그 →';
      default:
        return '다음 →';
    }
  }

  // ─── 인라인 마크업 파서 ──────────────────────────────────
  // [b]진하게[/b], [i]기울임[/i], [em]강조[/em],
  // 또는 *진하게* (마크다운 호환)
  function parseInline(text) {
    if (!text) return '';
    return escapeHTML(text)
      .replace(/\[b\](.+?)\[\/b\]/g,   '<strong>$1</strong>')
      .replace(/\[i\](.+?)\[\/i\]/g,   '<em>$1</em>')
      .replace(/\[em\](.+?)\[\/em\]/g, '<em>$1</em>')
      .replace(/\*\*(.+?)\*\*/g,        '<strong>$1</strong>')
      .replace(/__(.+?)__/g,            '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function escapeHTML(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── 외부 노출 ──────────────────────────────────────────
  window.GameEngine = {
    start: start,
    restart: restart,
    getState: () => ({ ...state }) // 디버그용
  };

})();

</script>

(function(){
  var data = {"ep":0,"slug":"jeongdojeon","korName":"정도전","personalName":"삼봉(三峰)","title":"정도전 — 도면의 사람","tagline":"600년의 도면을 그린 자","theme":"cold-iron","scenes":[{"type":"opening","question":"사람은 언제 죽는가?","glyph":"圖","series":"역사체험 교육 게임 · 조선의 왕 시리즈 번외편 · 정도전","lines":["[em]몸[/em]이 죽을 때.","[em]의지[/em]가 죽을 때.","사람들에게 [em]잊혀질[/em] 때."],"progLabel":"프롤로그"},{"type":"narration","era":"프롤로그 · 1350년경 · 영주","text":"1350년경. 영주.\n\n해가 진다.\n어린 정도전 — 마당 가운데에 서 있다.\n\n아이들이 둥글게 둘러쌌다.\n그들이 — [em]이름을 부른다.[/em]\n\n그 이름은 — [b]그의 이름이 아니다.[/b]","progLabel":"0막 · 어린 시절"},{"type":"context","year":"0막","title":"이름이 없는 아이 — 1342년 출생","body":"정도전은 [b]1342년[/b] 영주에서 태어났다. 본관 [em]봉화 정씨[/em]. 자(字)는 종지(宗之). 호는 [em]삼봉(三峰)[/em].\n\n아버지 [b]정운경[/b]은 형부상서까지 오른 정통 관료였다. 그러나 — 어머니 쪽이 문제였다. 어머니는 단양 우씨, 우연(禹延)의 딸. 우연의 외조모가 [em]천첩(賤妾)[/em] 출생이라는 시비가 있었다.\n\n그것이 정도전 평생을 따라다녔다. 권력자들이 그를 공격할 때 늘 꺼내는 카드 — [b]\"종의 자식\"[/b]. 정몽주·이숭인 같은 출중한 친구들 사이에서도, 과거에 급제한 뒤에도, 재상이 된 뒤에도 — [em]이 한 마디는 사라지지 않았다.[/em]\n\n이름은 — 누가 정하는가. 자기가 정하는가, 세상이 정하는가. 어린 정도전은 — 그 답을 [b]마당에서 처음 배웠다.[/b]","progLabel":"0막 · 어린 시절"},{"type":"game","dialogues":[{"type":"narration","text":"영주의 마당. 해가 기울고 있었다. 어린 정도전이 책을 들고 서 있었다.\n\n동네 아이들이 다가왔다. 다섯 명. 일곱 명. 모여들었다. 그들은 — 정도전을 둥글게 둘러쌌다."},{"type":"dial","role":"npc-c","who":"아이 1","text":"종의 자식."},{"type":"dial","role":"npc-c","who":"아이 2","text":"외할미가 종이라며. 그 피가 어디 가."},{"type":"dial","role":"npc-c","who":"아이 3","text":"이름도 천하다. 도전(道傳)? 도(道)는 — 양반들 글자다."},{"type":"inner","text":"이름은 — 내 것이 아닌가.\n아버지가 지어준 이름. [em]도(道)를 전한다.[/em] 그러나 — 사람들이 부르는 이름은 그것이 아니다. 그들이 부르는 이름은 — [b]종의 자식.[/b]"},{"type":"narration","text":"정도전은 — [b]책을 더 꽉 잡았다.[/b] 책 모서리가 손가락에 박혔다. 그러나 — 놓지 않았다.\n\n그날 밤 — 그는 책을 다 외웠다. [em]자기 이름을 새로 만들기 위해서.[/em]"}],"choice":{"type":"reflection","label":"당신이 \"종의 자식\"이라 불릴 때 — 무엇을 하겠는가?","flag":"act0_name","options":[{"text":"침묵하고 — 책을 더 잡는다","feedback":"정도전의 길이다. 그는 [em]말로 갚지 않았다.[/em] 글로 갚았다. 평생. 그가 쓴 [b]조선경국전[/b]은 — 그 마당에서 시작된 글이다. [em]\"내가 누군지를 — 내 글로 보여준다.\"[/em]"},{"text":"맞서 싸운다 — 그 자리에서","feedback":"정직한 길이다. 다만 — 한 번 싸우면 다음에 또 와야 한다. 정도전은 알았다. 마당의 싸움은 — [em]평생 끝나지 않는다.[/em] 그래서 그는 [b]마당을 떠나는 길[/b]을 골랐다. 책 안으로."},{"text":"그 자리를 떠난다 — 다른 곳으로","feedback":"현실적인 길이다. 그러나 정도전은 — [b]떠날 곳이 없었다.[/b] 다른 마당에 가도 같은 말을 들었다. 그래서 그는 떠나는 대신 — [em]자기 안으로[/em] 들어갔다. 책으로."}]},"progLabel":"0막 · 어린 시절"},{"type":"deep","tag":"0막 · 깊게 살펴보기","title":"이름이 죽은 자","text":"사람의 [b]첫 번째 죽음[/b]은 — 몸이 죽을 때가 아니다. [em]이름이 죽을 때[/em]다. 정도전은 어린 시절 — 한 번 죽었다. 마당의 둥근 원 안에서. 자기 이름이 자기 이름이 아니라는 것을 알았던 그날.\n\n어떤 사람은 이 첫 죽음에 — [b]주저앉는다.[/b] 어떤 사람은 — [b]도망친다.[/b] 어떤 사람은 — [em]새 이름을 만든다.[/em]\n\n정도전은 새 이름을 만들기로 했다. 그러나 — 새 이름은 말로 만들어지지 않는다. [b]일로 만들어진다.[/b] 그래서 그는 평생 [em]일[/em]만 했다. 책을 외웠다. 과거를 보았다. 비판을 했다. 유배를 갔다. 도면을 그렸다. 나라를 세웠다.\n\n그가 세운 나라의 이름이 — [b]조선(朝鮮)[/b]이다. 그 이름 안에 — 자기 어린 시절의 이름이 함께 들어 있었다. [em]종의 자식이 만든 나라.[/em] 그것이 그가 자기에게 준 [b]진짜 이름[/b]이었다.","quote":"이름이 죽은 자만이 — 새 이름을 만들 수 있다.","actId":"act0","progLabel":"0막 · 깊게 살펴보기"},{"type":"narration","era":"1막 · 1375년 → 1383년","text":"1375년. 서른넷.\n\n이인임을 비판했다.\n[em]친원파를 베라.[/em]\n\n돌아온 것은 — 유배.\n나주 회진. 거평부곡.\n\n9년이 흐른다.\n변방을 돈다.\n\n1383년 — 함흥.\n[b]그가 처음 보는 군영이 있었다.[/b]","progLabel":"1막 · 1375-1383"},{"type":"context","year":"1375-1383","title":"유배 9년 — 그리고 함흥","body":"1375년, [b]이인임[/b] 일파의 친원(親元) 외교를 비판했다. 명나라 사신을 영접하는 일을 거부했다. 그 결과 — [em]나주 회진 거평부곡[/em] 유배. 3년.\n\n거평부곡은 산골이었다. 정도전은 그곳에서 — 농민들과 살았다. 「[em]소재동기(消災洞記)[/em]」에 그는 썼다. *\"이 사람들은 글자를 모르나 — 마음에는 도(道)가 있다.\"* 양반의 글이 아니라 [b]사람[/b]을 본 시기였다.\n\n3년 후 풀려났지만 — 한양에 들어오지 못했다. 9년을 변방을 돌았다. 그리고 [b]1383년[/b], 마흔둘. 정도전은 — 함흥으로 갔다. 이성계의 [em]동북면 군영[/em]으로.\n\n그가 본 것은 — 칼이었다. 그가 본 것은 — [b]도면을 그릴 수 있는 칼[/b]이었다.","progLabel":"1막 · 1383년"},{"type":"game","dialogues":[{"type":"narration","text":"1383년 가을. 함흥. 군영 안. 군사들이 늘어서 있었다. 칼끝이 정렬되어 있었다. 활시위가 일제히 당겨졌다 풀렸다. 톱니바퀴처럼 — 움직였다.\n\n정도전은 — 오래 보았다."},{"type":"dial","role":"king","who":"이성계","text":"여기까지 왔는가."},{"type":"dial","role":"npc-a","who":"이지란","text":"이 사람이 그 정도전이오? 한양에서 — 글로 유명하다는."},{"type":"narration","text":"정도전은 — 이성계의 얼굴이 아니라 [em]군영[/em]을 다시 보았다. 군사들의 발. 칼의 각도. 깃발의 방향."},{"type":"dial","role":"king","who":"정도전","text":"장군. 이 군대로 — [b]무엇을 못 하겠습니까.[/b]"},{"type":"narration","text":"이성계의 표정이 — 잠깐 굳었다. 이지란도 — 정도전을 보았다. 그는 — 이 말이 무엇을 뜻하는지 알았다.\n\n*\"이 군대로 무엇을 못 하겠습니까(以此軍何事不可).\"* 이것은 — 칭찬이 아니었다. 이것은 — [b]제안[/b]이었다."},{"type":"inner","text":"다시 태어났다.\n어린 시절 마당에서 한 번 죽은 자가 — 칼끝의 정렬 앞에서 [em]두 번째 이름[/em]을 받았다. 그 이름은 — [b]설계자.[/b]"}],"choice":{"label":"정도전이 이 말로 [b]자신에게[/b] 다짐한 것은?","flag":"act1_oath","options":[{"text":"이 칼로 — 임금을 도와 옛 나라를 고치겠다","correct":false,"blockMessage":"그것은 [em]옛 길[/em]이다. 정도전은 9년 유배 동안 — 고려는 고칠 수 없다는 결론에 도달했다. 그래서 함흥에 왔다. [b]고치러 온 것이 아니라 — 바꾸러 온 것이다.[/b]"},{"text":"이 칼로 — 새 나라를 세우고, 그 도면을 내가 그리겠다","correct":true},{"text":"이 칼이 — 결국 나를 향할 것이다. 거리를 두겠다","correct":false,"blockMessage":"정도전은 이미 — 거리를 둘 자리에 있지 않았다. 함흥에 [em]찾아온 순간[/em] 그는 자기 발로 도면 안에 들어왔다. 칼이 나를 향할 수 있다는 것을 — 그는 알았다. [b]알면서도 들어왔다.[/b] 그것이 설계자의 자리다."}]},"progLabel":"1막 · 1383년"},{"type":"deep","tag":"1막 · 깊게 살펴보기","title":"다시 태어났다","text":"*\"이 군대로 무엇을 못 하겠습니까.\"* 이 한 마디가 — 정도전의 [b]두 번째 출생[/b]이었다. 어머니가 낳은 정도전은 — 영주의 아이였다. 종의 자식이라 불린 아이였다. 그러나 — 함흥의 군영이 낳은 정도전은 [em]도면을 그릴 수 있는 사람[/em]이었다.\n\n그가 본 것은 단순한 군대가 아니었다. 그가 본 것은 — [b]질서[/b]였다. 톱니바퀴처럼 움직이는 사람들. 한 사람의 의지로 — 천 명이 같은 방향을 보는 것. 그것이 [em]나라[/em]의 원형이라는 것을 그는 알았다.\n\n이성계는 — 자기가 [b]나라가 될 수 있다[/b]는 것을 그때 처음 들었다. 정도전이 그것을 [em]말로 만들어 주었다.[/em] 그날 이전까지 이성계는 무장이었다. 그날 이후 — 그는 [b]건국자가 될 수 있는 사람[/b]이었다.\n\n둘은 서로를 낳았다. 정도전이 이성계를 낳았고, 이성계가 정도전을 낳았다. [em]그것이 1383년 함흥의 진짜 사건이다.[/em]","quote":"다시 태어난 자는 — 두 번 죽을 수 있는 자이다.","actId":"act1","progLabel":"1막 · 깊게 살펴보기"},{"type":"narration","era":"2막 · 1389-1392","text":"1389년 12월.\n[em]강릉의 우왕[/em] — 죽다.\n[em]강화의 창왕[/em] — 죽다.\n\n도면이 — [b]피로 그어진다.[/b]\n\n1392년 4월.\n선죽교.\n[em]정몽주[/em] — 죽다.\n\n정도전은 — 도면 앞에 앉아 있다.\n붓을 든다.\n[b]손이 떨린다.[/b]","progLabel":"2막 · 1389-1392"},{"type":"context","year":"1389-1392","title":"친구를 잃은 자리","body":"정몽주는 정도전의 [b]평생 친구[/b]였다. 같이 [em]이색[/em] 문하에서 배웠다. 같이 신진사대부였다. 둘 다 — 고려를 사랑했고, 고려를 고치고 싶어 했다.\n\n그러나 — 결정적 지점에서 [b]갈렸다.[/b] 정몽주는 [em]고려 안에서의 개혁[/em]을 끝까지 믿었다. 정도전은 — [em]고려 자체를 바꿔야 한다[/em]고 결론냈다.\n\n[b]1389년[/b] 우왕과 창왕을 폐위했다. \"우왕·창왕은 [em]신돈의 자식[/em]이다(신우신창설)\" — 정도전이 주도한 논리였다. 정몽주도 동의했다. 그해 12월, 강릉의 우왕과 강화의 창왕이 — [b]죽임을 당했다.[/b] 정도전의 도면 위에서.\n\n[b]1392년 4월 4일.[/b] 정몽주가 이성계 일파를 마지막으로 막으려 했다. 그날 — [em]선죽교[/em]에서 이방원의 손에 죽었다. 정도전은 — 그 시신을 보러 가지 않았다.\n\n3개월 뒤 — [b]7월 17일, 조선이 열렸다.[/b]","progLabel":"2막 · 1392년"},{"type":"game","dialogues":[{"type":"narration","text":"1392년 4월 5일. 새벽. 정도전의 집. 사람이 와서 — 한 마디를 했다.\n\n*\"정몽주가 — 죽었습니다.\"*\n\n정도전은 도면을 보고 있었다. 새 나라의 도면. 종이 위에 — 글자가 있었다. *조선(朝鮮).* 아직 미정의 이름. 그가 잠시 적어본 이름."},{"type":"inner","text":"친구가 죽었다.\n그러나 — 죽인 자는 [b]내가 아니다.[/b]\n아니 — 죽인 자는 [em]내가 그린 도면이다.[/em]"},{"type":"narration","text":"도면 위에서 — 손이 떨렸다. 그러나 — 그 떨림은 [b]아무도 보지 못했다.[/b] 정도전은 그것을 — 안 보이게 했다.\n\n그날 오후, 이방원이 정도전을 찾아왔다."},{"type":"dial","role":"npc-c","who":"이방원","text":"정몽주는 — 끝까지 우리를 막으려 했소. 어쩔 수 없었소."},{"type":"dial","role":"king","who":"정도전","text":"이방원. 그 칼은 — [b]평생 너의 손에 남는다.[/b]"},{"type":"narration","text":"이방원은 — 정도전을 오래 보았다. 둘은 같은 [em]도면[/em] 위에 있었다. 그러나 — [b]각자 다른 자리에서.[/b]\n\n그날 밤 정도전은 — 정몽주가 자기에게 보낸 [em]옛 시[/em] 한 편을 펼쳤다. 읽지 않았다. 한참 그대로 두었다. 그리고 — [b]접었다.[/b]"}],"choice":{"type":"reflection","label":"정몽주의 죽음 — 정도전에게 그것은 무엇이었는가?","flag":"act2_loss","options":[{"text":"친구의 죽음 — 평생 짊어진 슬픔","feedback":"그것은 사실이었다. 정도전은 [em]정몽주의 이름을 다시 입에 올리지 않았다.[/em] 그것은 잊었기 때문이 아니라 — [b]잊을 수 없었기 때문에[/b]였다."},{"text":"도면의 대가 — 큰 그림을 위한 필연","feedback":"정도전 자신의 답이었을 것이다. *\"도면을 그리는 자는 — 도면의 대가를 자기 안에서 치른다.\"* 그러나 — [b]대가를 치렀다는 말이 슬픔이 없었다는 뜻은 아니다.[/b]"},{"text":"자기 자신의 죽음 — 도덕적 자아가 함께 죽었다","feedback":"이것이 [b]두 번째 죽음[/b]이었다. 어린 시절 [em]이름이 죽었고[/em], 그 자리에서 — [em]책을 잡고 시를 쓰던 사람[/em]이 죽었다. 그 후 정도전은 — 도면만 보고 살았다."},{"text":"답할 수 없다 — 한 사람의 슬픔을 한 단어로 평가할 수 없다","feedback":"[b]가장 정직한 답이다.[/b] 정도전은 — 평생 그 답을 정하지 않았다. 정하지 못한 채로 — 도면을 그렸다. 그것이 [em]도면 위의 진짜 무게[/em]였다."}]},"progLabel":"2막 · 1392년"},{"type":"deep","tag":"2막 · 깊게 살펴보기","title":"손이 떨렸다","text":"[em]신우신창설[/em]로 우왕과 창왕을 폐위했다. 1389년 12월, 둘은 [b]죽임을 당했다.[/b] 우왕은 강릉에서, 창왕은 강화에서. 정도전이 주도한 논리 위에서 — 두 어린 왕이 죽었다. 한 명은 스물여섯, 한 명은 [em]열 살[/em]이었다.\n\n3년 뒤, 친구가 죽었다. 같이 글을 읽었던 친구. 같이 고려를 사랑했던 친구. 끝까지 [em]다른 도면[/em]을 그리려 했던 친구.\n\n정도전은 — 이 모든 것을 [b]자기 도면의 무게[/b]로 끌어안았다. 변명하지 않았다. 다른 사람에게 떠넘기지 않았다. 그러나 — 그날 이후 그의 시(詩)는 — [em]거의 사라진다.[/em] 그는 시인이었던 사람이다. 학자였던 사람이다. 그가 — 시를 거의 쓰지 않게 된 그 순간.\n\n그 순간이 — 정도전의 [b]두 번째 죽음[/b]이었다. 책을 잡고 시를 쓰던 한 사람이 — 그 안에서 죽었다. 그리고 — [em]설계자[/em]만 남았다.","quote":"도면을 그리는 자는 — 도면의 대가를 자기 안에서 치른다.","actId":"act2","progLabel":"2막 · 깊게 살펴보기"},{"type":"narration","era":"3막 · 1394-1397","text":"1394년. 「[em]조선경국전[/em]」.\n나라의 [b]법[/b]을 그린다.\n\n1394년 8월. 한양 천도.\n나라의 [b]자리[/b]를 그린다.\n\n1395년. 경복궁.\n나라의 [b]집[/b]을 그린다.\n\n전각마다 이름을 단다.\n근정. 사정. 강녕. 교태.\n사대문에 인의예지를 새긴다.\n\n한 글자 한 글자가 — [b]600년을 가는 못[/b]이다.","progLabel":"3막 · 1394-1397"},{"type":"context","year":"1394-1397","title":"도면의 시간","body":"조선이 열린 후 6년. 정도전은 — [b]4가지 도면[/b]을 그렸다.\n\n[em]법의 도면[/em]: [b]「조선경국전」(1394)[/b]. 정도전이 사찬(私撰)으로 완성한 조선의 헌법. 「경국대전」의 모태.\n\n[em]자리의 도면[/em]: [b]한양 천도(1394.8)[/b]. 정도전이 자리를 골랐다. 북악산 아래. 좌청룡 우백호. 종묘는 동에, 사직은 서에. 도성의 사대문, 사소문 위치까지.\n\n[em]집의 도면[/em]: [b]경복궁(1395.9 완공)[/b]. 정도전이 자리, 방향, 모든 전각의 배치, 그리고 — [em]이름[/em]까지 지었다. 근정전(勤政) 사정전(思政) 강녕전(康寧) 교태전(交泰). 사대문에 [b]인의예지[/b]를 새겼다. 흥인지문(東) 돈의문(西) 숭례문(南) 숙정문(北).\n\n[em]정치의 도면[/em]: [b]「경제문감」(1397)[/b]. [em]재상 중심 정치[/em]를 이론으로 정리했다. 임금은 상징이 되고, 재상이 실질 정치를 한다. 임금 한 사람의 능력에 나라가 흔들리지 않게.\n\n[b]이 4개의 도면이 — 600년을 갔다.[/b]","progLabel":"3막 · 1394-1397"},{"type":"game","dialogues":[{"type":"narration","text":"1395년 가을. 정도전은 「경복궁기(景福宮記)」를 쓰고 있다. 붓을 들고. 종이 앞에. 옆에 — 이성계가 와서 본다."},{"type":"dial","role":"king","who":"이성계","text":"이 자리에 — 무엇이 들어서는가."},{"type":"dial","role":"king","who":"정도전","text":"이 자리에 — 근정전(勤政). 정치에 부지런하라. 이 자리에 — 사정전(思政). 정치를 생각하라. 이 자리에 — 강녕전(康寧). 임금이 편안하라. 이 자리에 — 교태전(交泰). 음양이 조화를 이루라."},{"type":"inner","text":"한 글자, 한 글자가 — [b]600년을 가는 못[/b]이다.\n사람은 죽어도 — 글자는 남는다."},{"type":"dial","role":"king","who":"이성계","text":"자네는 — 이 도면 안에 [em]임금[/em]을 두는가, [em]신하[/em]를 두는가."},{"type":"narration","text":"정도전은 — 잠깐 붓을 멈췄다. 이성계의 눈을 봤다. 오래 봤다."},{"type":"dial","role":"king","who":"정도전","text":"이 도면 안에는 — [b]나라[/b]가 있습니다. 임금도, 신하도, 백성도 — 그 안에 있습니다.\n\n임금은 [em]상징[/em]이 되십시오. 재상이 — [b]일[/b]을 하겠습니다. 한 사람의 능력에 나라가 흔들리지 않게."},{"type":"narration","text":"이성계는 — 오래 침묵했다. 그리고 — 고개를 끄덕였다.\n\n그러나 — 그날 옆방에 있던 [b]다섯째 아들[/b]이 — 이 말을 들었다."}],"choice":{"label":"정도전이 「경제문감」에서 그린 [b]조선의 핵심 원칙[/b]은?","flag":"act3_design","options":[{"text":"강한 왕이 모든 것을 직접 결정하는 나라","correct":false,"blockMessage":"그것은 — 정도전이 [em]그리지 않은[/em] 도면이다. 강한 왕은 — 능력이 있는 동안만 강하다. 다음 왕이 약하면? 나라가 흔들린다. [b]정도전은 그 위험을 알았다.[/b]"},{"text":"재상이 정치를 하고 왕은 상징으로 있는 나라","correct":true},{"text":"신하들이 서로 견제하며 왕을 흔드는 나라","correct":false,"blockMessage":"정도전은 — 신하들의 싸움이 나라를 흔드는 것을 [em]가장 경계했다.[/em] 그가 그린 것은 [b]한 사람의 책임자(재상)[/b]가 있는 도면이었다. 책임을 분산시키는 것이 아니라 — 책임을 [em]명확히[/em] 하는 것."}]},"progLabel":"3막 · 1394-1397"},{"type":"deep","tag":"3막 · 깊게 살펴보기","title":"도면이 사람보다 오래 산다","text":"정도전은 — 자기가 [em]오래 살 것[/em]을 몰랐다. 그러나 — 자기 [b]도면[/b]은 오래 살 것을 알았다.\n\n1395년의 도면이 — 1500년대도, 1700년대도, 1900년대도 그대로 살아 있었다. 임진왜란에 경복궁이 불탔다. 그러나 — [b]자리[/b]는 그대로였다. 흥선대원군이 다시 세웠다. 그 자리에. 그 방향으로. 정도전이 그린 그대로.\n\n광화문 — 지금 이 순간에도 정도전의 도면이다. 그가 그린 길 위로 사람이 걷는다. 그가 정한 자리에 — 어떤 결정이 내려진다. 그가 적은 [b]인의예지[/b] 네 글자가 — 도성의 사대문에 600년 동안 박혀 있다.\n\n[em]재상 중심 정치[/em]는 — 이방원에게 무너졌다. 그러나 — [b]완전히 무너지지는 않았다.[/b] 조선이 27명의 왕을 거치는 동안, 신하들의 자리는 — 정도전이 그린 자리 위에 있었다. 영의정 좌의정 우의정. 6조. 의정부. 그가 그린 도면 위에서 — 500년의 정치가 굴러갔다.\n\n사람은 잊혀질 때 죽는다. 그런데 — [em]도면을 그린 자는 잊혀지지 않는다.[/em] 그의 이름이 잊혀져도, 그가 그린 자리에 사람들이 [b]계속[/b] 살고 있으면 — 그는 [em]도면 안에서[/em] 살고 있는 것이다.","quote":"사람은 짧고 도면은 길다.\n그러므로 — 짧은 사람이 긴 도면을 그릴 때, 그 사람은 [em]도면 안에서 산다.[/em]","actId":"act3","progLabel":"3막 · 깊게 살펴보기"},{"type":"narration","era":"4막 · 1398.8.26 · 정답 없음","text":"1398년 8월 26일. 밤.\n\n남은의 집.\n등불. 술잔.\n\n도면 — 종이는 없었지만\n[em]머릿속에 늘 있는[/em] 도면.\n\n밖에서 — [b]횃불.[/b]\n말발굽.\n\n정도전 — [em]일어선다.[/em]\n도망가지 않는다.","progLabel":"4막 · 1398.8.26"},{"type":"context","year":"1398","title":"마지막 밤","body":"1398년 8월. 이성계의 병이 깊었다. 정도전은 — [b]사병 혁파[/b]를 추진하고 있었다. 왕자들이 사병을 가지는 것을 금지하는 일. 이방원에게 — [em]목숨이 걸린 일[/em]이었다.\n\n8월 26일 밤. 정도전은 [b]남은(南誾)의 집[/b]에서 술을 마시고 있었다. 가벼운 자리였다. 도면 이야기. 다음 도면 이야기.\n\n그때 — 이방원이 군사를 일으켰다. 명분: *\"정도전이 왕자들을 [em]제거하려 한다[/em].\"* 진실인지 아닌지 — 600년이 지나도 답이 안 나는 문제. 그러나 — 그날 밤 그것은 [b]명분이 되었다.[/b]\n\n남은의 집이 포위됐다. 횃불이 켜졌다. 정도전은 — 나왔다. 도망갈 수 있었다. 담을 넘을 줄 알았다. [b]그러나 나오지 않았다.[/b] 자기 발로 — 마당으로 나갔다.\n\n그 자리에서 — 죽임을 당했다. 쉰일곱. 그날 밤 방번도, 방석도, 남은도 — 함께 죽었다.\n\n조선이 망할 때까지 — [b]467년 동안[/b] 그는 [em]역적[/em]이었다. 그러나 — 그가 그린 도면은 그 467년 동안에도 [b]작동했다.[/b]","progLabel":"4막 · 1398년"},{"type":"game","dialogues":[{"type":"narration","text":"1398년 8월 26일. 밤. 남은의 집. 술 두 잔이 비어 있었다. 가벼운 이야기. 그때 — 밖에서 횃불 소리. 말발굽 소리. 군사들의 발소리."},{"type":"inner","text":"왔구나.\n[em]도면을 그리는 자는 — 언젠가 자기 도면 위에서 베이게 된다.[/em] 그것을 — 1383년 함흥의 군영 앞에서 이미 알았다."},{"type":"narration","text":"정도전은 — 일어섰다. 옷매무새를 정돈했다. 남은이 — 그를 보았다."},{"type":"dial","role":"father","who":"남은","text":"삼봉. 뒷문이 있소."},{"type":"dial","role":"king","who":"정도전","text":"뒷문으로 나가도 — 같은 칼이 기다린다. 앞으로 나가겠소."},{"type":"narration","text":"정도전이 마당으로 나갔다. 횃불 아래. 이방원이 — 말 위에 있었다."},{"type":"dial","role":"npc-c","who":"이방원","text":"정도전. 마지막 할 말이 있느냐."},{"type":"dial","role":"king","who":"정도전","text":"이방원. 자네가 베는 것은 — [b]내 몸[/b]이지, 내 [em]도면[/em]이 아니다.\n\n자네는 — 자네가 무엇을 베는지 모르고 있다."},{"type":"narration","text":"이방원은 — 잠깐 정도전을 보았다. 오래 보았다. 그리고 — 손을 내렸다.\n\n칼이 내려졌다."}],"choice":{"type":"reflection","label":"[b]당신은[/b] 정도전이 언제 죽었다고 생각하는가?","flag":"act4_when","options":[{"text":"1398년 8월 26일 — 몸이 죽은 그 밤","feedback":"가장 흔한 답이다. 그리고 가장 명료한 답이다. 그러나 — [em]몸의 죽음[/em]은 한 사람의 죽음의 시작일 수도, 끝일 수도 있다. 정도전의 경우 — 시작도 끝도 아니다. [b]그저 한 지점일 뿐이다.[/b]"},{"text":"어린 시절 — \"종의 자식\"이라 불리며 이름이 죽었을 때","feedback":"가장 인간적인 답이다. 한 사람의 [b]첫 죽음[/b]은 이름이 죽을 때다. 정도전은 그때 한 번 죽었다. 그래서 그는 — 새 이름을 만들기 위해 [em]평생[/em]을 썼다. 그 평생 자체가 — [b]첫 죽음에 대한 답[/b]이었다."},{"text":"1392년 — 정몽주를 잃고, 손에 피가 묻은 그날","feedback":"가장 도덕적인 답이다. 그날 — 책을 잡고 시를 쓰던 사람이 그의 안에서 죽었다. 그리고 [em]설계자[/em]만 남았다. [b]도덕은 자기 안에서 죽어도 — 도면은 자기 밖에서 계속 살았다.[/b] 그것이 한 인간이 견딜 수 있는 무게의 끝이었을지도."},{"text":"아직 죽지 않았다 — 그의 도면이 600년째 살아 있으므로","feedback":"가장 멀리 본 답이다. 우리가 광화문을 걷는 한 — 정도전은 [b]살아 있다.[/b] 사람은 잊혀질 때 죽는다. 그러나 정도전은 — 도면 안에서 [em]잊혀지지 않는다.[/em] 우리가 모르는 사이에도 — 그는 우리를 [b]자기 도면 위에 세워두고 있다.[/b]"}]},"progLabel":"4막 · 정답 없음"},{"type":"deep","tag":"4막 · 깊게 살펴보기","title":"도면이 사람보다 오래 산다","text":"1398년 8월 26일. 몸이 죽었다. 1865년 가을. 흥선대원군이 신원을 회복했다. [b]467년이 지났다.[/b] 그동안 정도전은 — 공식적으로 [em]역적[/em]이었다. 이름이 거론될 때마다 — 비난의 대상이었다.\n\n그러나 — 그 467년 동안 한양은 [b]그가 그린 그대로[/b] 작동했다. 임진왜란에 경복궁이 불탔다 — 다시 세웠다. 그가 그린 자리에. 그가 정한 방향으로. 그가 적은 이름으로. 근정전. 사정전. 강녕전. 교태전. 흥인지문. 돈의문. 숭례문. 숙정문.\n\n[em]그가 죽은 후[/em]에도 — 신하들은 [b]그가 그린 자리[/b]에서 일했다. 영의정. 좌의정. 우의정. 의정부. 6조. 이방원이 [em]재상 중심[/em]을 무너뜨리고 [em]강한 왕[/em]으로 가려 했지만 — 완전히 무너뜨리지 못했다. 그가 그린 구조가 — 너무 잘 만들어져 있어서, 다음 왕들도 결국 — [b]그 구조 안에서[/b] 움직였다.\n\n2026년 봄. 광화문. 사람들이 모인다. 어떤 결정이 — 이 자리에서 만들어진다. 사람들은 — 자기들이 정도전의 [em]도면 위[/em]에 서 있다는 것을 [b]알지 못한다.[/b] 그러나 — 알지 못한다는 사실 자체가, 도면이 얼마나 깊이 살아 있는지를 — 보여준다.\n\n[b]도면이 사람보다 오래 산다.[/b] 그것이 정도전이 자기 어린 시절 — 마당에서부터 알고 있었던 답이었다. *\"종의 자식\"*이라 불리던 그 아이가 — 그 답을 평생에 걸쳐 [em]증명했다.[/em]","quote":"사람이 죽는 것은 한 번이지만, [em]도면[/em]을 그린 사람의 죽음은 — 도면이 사라질 때까지 [b]유보된다.[/b]","actId":"act4","progLabel":"4막 · 깊게 살펴보기","last":true},{"type":"epilogue","year":"에필로그 · 도면이 사람보다 오래 산다","title":"잊혀지지 않은 자","paragraphs":["[b]1398년 8월 26일.[/b] 남은의 집에서 한 사람이 죽었다. 그는 쉰일곱이었다. 어린 시절 \"종의 자식\"이라 불리던 아이가 — 한 나라의 [em]도면[/em]을 그리고 — [b]자기가 그린 도면 위에서[/b] 죽었다.","[b]1865년 가을.[/b] 흥선대원군이 그의 신원을 회복했다. [em]467년이 지났다.[/em] 그는 그동안 죽어 있었다. [em]그렇게 기록되어 있었다.[/em] 그러나 — 한양은 그동안에도 그가 그린 그대로 [b]작동했다.[/b]","[b]2026년 봄.[/b] 광화문. 사람들이 모여 있다. 어떤 결정이 — 이 자리에서 만들어진다. 사람들은 — 자기들이 정도전의 [em]도면 위[/em]에 서 있다는 것을 [b]알지 못한다.[/b]","사람은 — [em]몸[/em]이 죽을 때 죽지 않는다. 사람은 — [em]의지[/em]가 죽을 때 죽지 않는다. 사람은 — [b]잊혀질 때 죽는다.[/b]","정도전은 — [b]잊혀지지 않았다.[/b] 그의 이름이 사라졌어도. 그의 도면이 — [em]그를 기억한다.[/em]"],"quote":"도면이 사람보다 오래 산다.\n그러므로 — 도면을 그린 자는, 마지막에 [em]잊혀지지 않는다.[/em]","progLabel":"에필로그"}]};
